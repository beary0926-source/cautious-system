  });
  drawGlowText('WEAPON', 30, baseY - 100, {
    size: 10, color: 'rgba(255,255,255,0.5)', weight: 700, letterSpacing: 3, glowBlur: 0,
  });
  drawGlowText('LV.' + weaponLevel, 30, baseY - 60, {
    size: 24, color: '#FFFFFF', weight: 900, letterSpacing: 2, glowBlur: 0,
  });

  // Bottom-Right: Shield cooldown arc
  const arcX = canvas.width - 60;
  const arcY = canvas.height - 60;
  const arcR = 28;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(arcX, arcY, arcR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  const ready = player.aoeCooldown <= 0;
  const progress = ready ? 1 : (1 - player.aoeCooldown / SHIELD_COOLDOWN);
  ctx.save();
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2;
  ctx.globalAlpha = ready ? 1 : 0.7;
  ctx.beginPath();
  ctx.arc(arcX, arcY, arcR, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  drawGlowText('SHIELD', arcX, arcY + 55, {
    size: 10, color: 'rgba(255,255,255,0.5)', weight: 700, letterSpacing: 3, align: 'center', glowBlur: 0,
  });

  if (ready) {
    drawGlowText('READY', arcX, arcY + 5, {
      size: 10, color: '#FFFFFF', weight: 700, letterSpacing: 2, align: 'center', baseline: 'middle', glowBlur: 0,
    });
  }

  // Bottom-Center: Frenzy banner
  if (player.frenzyTimer > 0) {
    const fy = canvas.height - 140;
    const fAlpha = Math.min(1, player.frenzyTimer / 0.3);
    const fPulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.015);
    drawGlowText('FRENZY', canvas.width / 2, fy, {
      size: 32, color: '#FFFFFF', weight: 900, letterSpacing: 8,
      align: 'center', glowBlur: 0, alpha: fAlpha,
    });
    const barW = 160;
    const remain = player.frenzyTimer / FRENZY_DURATION;
    ctx.save();
    ctx.globalAlpha = fAlpha;
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2 - barW / 2, fy + 12);
    ctx.lineTo(canvas.width / 2 - barW / 2 + barW * remain, fy + 12);
    ctx.stroke();
    ctx.restore();
  }

  // Absorb-mode edge glow
  if (player.keys.has(' ')) {
    ctx.save();
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.15 + 0.1 * Math.sin(Date.now() * 0.008);
    ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);
    ctx.restore();
    if (ceasefireTimer < GRAVITY_WINDOW) {
      drawGlowText('CHARGING ' + Math.ceil(GRAVITY_WINDOW - ceasefireTimer) + 's', canvas.width / 2, canvas.height - 180, {
        size: 14, color: '#FFFFFF', weight: 900, letterSpacing: 6,
        align: 'center', glowBlur: 0, alpha: 0.7,
      });
    } else {
      drawGlowText('ABSORBING', canvas.width / 2, canvas.height - 180, {
        size: 14, color: '#FFFFFF', weight: 900, letterSpacing: 6,
        align: 'center', glowBlur: 0, alpha: 0.7,
      });
    }
  }
}

function drawMilestoneNotify(dt) {
  if (milestoneNotify.timer <= 0) return;
  milestoneNotify.timer = Math.max(0, milestoneNotify.timer - dt);
  const t = 1 - milestoneNotify.timer / milestoneNotify.maxTime;
  let scale;
  if (t < 0.15) scale = t / 0.15;
  else if (t < 0.8) scale = 1;
  else scale = 1 + (t - 0.8) * 2;
  const alpha = t < 0.7 ? 1 : Math.max(0, 1 - (t - 0.7) / 0.3);
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 3);
  ctx.scale(scale, scale);
  drawGlowText(milestoneNotify.text, 0, 0, {
    size: 42, color: '#FFFFFF', weight: 900, letterSpacing: 6,
    align: 'center', glowBlur: 0, alpha,
  });
  drawGlowText('\u2014 WEAPON EVOLVED \u2014', 0, 36, {
    size: 12, color: 'rgba(255,255,255,0.6)', weight: 700, letterSpacing: 8,
    align: 'center', glowBlur: 0, alpha: alpha * 0.8,
  });
  ctx.restore();
}

// ── Tutorial System ───────────────────────────────────────────
const TUTORIAL_CONTENT = [
  // Step 0: basics (shown right after game starts)
  [
    'WASD — 移动',
    '鼠标 — 控制射击方向（自动发射）',
  ],
  // Step 1: survival + shield (shown when enemies become visible)
  [
    '别让他们碰到你。',
    '',
    '单击 Space — 展开护盾，弹开敌人',
    '长按 Space — 加速移动，但无法发射子弹',
  ],
  // Step 2: nutrients (shown when first nutrient drops)
  [
    '长按 Space 三秒，养分会自动飞向你。',
    '吸收养分可触发爆发波，并提升武器等级。',
  ],
];

function showTutorial(step) {
  if (tutorial.done || tutorial.active) return;
  if (step >= TUTORIAL_CONTENT.length) {
    tutorial.step = TUTORIAL_CONTENT.length;
    tutorial.done = true;
    try { localStorage.setItem('ming_tutorial_done', '1'); } catch(e) {}
    return;
  }
  tutorial.active = true;
  tutorial.step = step;
  tutorial.lines = TUTORIAL_CONTENT[step];
}

function dismissTutorial() {
  if (!tutorial.active) return;
  tutorial.active = false;
  tutorial.step++;
  if (tutorial.step >= TUTORIAL_CONTENT.length) {
    tutorial.done = true;
    try { localStorage.setItem('ming_tutorial_done', '1'); } catch(e) {}
  }
}

function drawTutorial() {
  if (!tutorial.active) return;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const lineH = 30;
  const lines = tutorial.lines;
  const blockH = lines.length * lineH;

  // Semi-transparent overlay
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  // Draw lines centered
  const startY = cy - blockH / 2 + lineH / 2;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i] === '') continue;
    drawGlowText(lines[i], cx, startY + i * lineH, {
      size: 16, color: '#FFFFFF', weight: 500, letterSpacing: 2,
      align: 'center', glowBlur: 0, alpha: 0.9,
    });
  }

  // "Press any key" prompt
  const pulse = 0.4 + 0.4 * Math.sin(Date.now() * 0.004);
  drawGlowText('点击任意位置继续', cx, startY + lines.length * lineH + 20, {
    size: 12, color: '#FFFFFF', weight: 500, letterSpacing: 3,
    align: 'center', glowBlur: 0, alpha: pulse,

function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();

  const cx = canvas.width / 2;
  let y = canvas.height / 2 - 180;

  // Title
  drawGlowText('GAME OVER', cx, y, {
    size: 64, color: '#FFFFFF', weight: 900, letterSpacing: 12,
    align: 'center', glowBlur: 0,
  });
  y += 80;

  // Survived label + time
  drawGlowText('SURVIVED', cx, y, {
    size: 12, color: 'rgba(255,255,255,0.5)', weight: 700, letterSpacing: 4, align: 'center', glowBlur: 0,
  });
  y += 40;
  drawGlowText(formatTime(survivalTime), cx, y, {
    size: 56, color: '#FFFFFF', weight: 900, letterSpacing: 6,
    align: 'center', glowBlur: 0,
  });

  // New record
  if (isNewBest) {
    y += 32;
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.01);
    drawGlowText('NEW RECORD', cx, y, {
      size: 16, color: '#FFFFFF', weight: 900, letterSpacing: 6,
      align: 'center', glowBlur: 0, alpha: pulse,
    });
  }
  y += 70;

  // Stats grid (2 columns)
  const bestTime = getBestTime();
  const statLabels = [
    ['KILLS',     String(stats.totalKills)],
    ['NUTRIENTS', String(stats.nutrientsCollected)],
    ['MAX WEAPON','LV.' + stats.maxWeaponLevel],
    ['BEST',      bestTime > 0 ? formatTime(bestTime) : '--:--'],
  ];
  for (let i = 0; i < statLabels.length; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const sx = cx + (col === 0 ? -120 : 120);
    const sy = y + row * 50;
    drawGlowText(statLabels[i][0], sx, sy, {
      size: 10, color: 'rgba(255,255,255,0.5)', weight: 700, letterSpacing: 3, align: 'center', glowBlur: 0,
    });
    drawGlowText(statLabels[i][1], sx, sy + 22, {
      size: 22, color: '#FFFFFF', weight: 900, letterSpacing: 2,
      align: 'center', glowBlur: 0,
    });
  }
  y += 110;

  // Kill breakdown by enemy type
  const killDetails = [
    { count: stats.kills.shuttleSmall + stats.kills.shuttleLarge, color: '#C060FF' },
    { count: stats.kills.devourer, color: '#00FFEE' },
    { count: stats.kills.jellyfish, color: '#80FF40' },
    { count: stats.kills.leviathan, color: '#FF3060' },
  ];
  const totalW = killDetails.length * 80;
  let kx = cx - totalW / 2 + 40;
  for (const k of killDetails) {
    ctx.save();
    ctx.fillStyle = k.color;
    ctx.beginPath();
    ctx.arc(kx - 22, y - 4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    drawGlowText(String(k.count), kx + 5, y + 2, {
      size: 14, color: '#FFFFFF', weight: 700, letterSpacing: 1, glowBlur: 0,
    });
    kx += 80;
  }
  y += 50;

  // Restart prompt
  const rPulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);
  drawGlowText('PRESS SPACE TO RESTART', cx, y, {
    size: 14, color: '#FFFFFF', weight: 700, letterSpacing: 6,
    align: 'center', glowBlur: 0, alpha: 0.5 + rPulse * 0.5,
  });
}

function drawSceneBackdrop(isIntro) {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (isIntro) {
    gradient.addColorStop(0, '#65e2e0');
    gradient.addColorStop(0.18, '#4adbd9');
    gradient.addColorStop(0.54, '#27d1d1');
    gradient.addColorStop(1, '#12bbb9');
  } else {
    gradient.addColorStop(0, '#64dfdf');
    gradient.addColorStop(0.2, '#4bd9d9');
    gradient.addColorStop(0.55, '#26d0d1');
    gradient.addColorStop(1, '#11bdbb');
  }
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const glow = ctx.createRadialGradient(
    canvas.width * 0.5, canvas.height * 0.44, 0,
    canvas.width * 0.5, canvas.height * 0.44, Math.max(canvas.width, canvas.height) * 0.8
  );
  glow.addColorStop(0, 'rgba(255,255,255,0.16)');
  glow.addColorStop(0.28, 'rgba(255,255,255,0.1)');
  glow.addColorStop(0.6, 'rgba(255,255,255,0.035)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const depthGlow = ctx.createRadialGradient(
    canvas.width * 0.52, canvas.height * 0.48, Math.max(canvas.width, canvas.height) * 0.04,
    canvas.width * 0.52, canvas.height * 0.48, Math.max(canvas.width, canvas.height) * 0.42
  );
  depthGlow.addColorStop(0, 'rgba(255,255,255,0.05)');
  depthGlow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = depthGlow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawBgParticles() {
  ctx.save();
  for (let i = 0; i < bgParticles.length; i++) {
    const p = bgParticles[i];
    const bright = 0.3 + p.alpha * 0.9;
    ctx.globalAlpha = bright;
    ctx.fillStyle = '#ecffff';
    ctx.shadowBlur = 8;
    ctx.shadowColor = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 1.15, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function updateAndDrawEnemyCard(dt) {
  if (!enemyCard.active) return;
  const totalTime = enemyCard.fadeInTime + enemyCard.stayTime + enemyCard.fadeOutTime;
  enemyCard.timer += dt;
  if (enemyCard.timer >= totalTime) {
    enemyCard.active = false;
    return;
  }

  let alpha = 1;
  if (enemyCard.timer < enemyCard.fadeInTime) {
    alpha = enemyCard.timer / enemyCard.fadeInTime;
  } else if (enemyCard.timer > enemyCard.fadeInTime + enemyCard.stayTime) {
    alpha = 1 - (enemyCard.timer - enemyCard.fadeInTime - enemyCard.stayTime) / enemyCard.fadeOutTime;
  }

  const x = canvas.width - 350;
  const y = 46;
  const w = 300;
  const h = 126 + enemyCard.lines.length * 18;
  drawRoundedPanel(x, y, w, h, {
    radius: 18,
    fill: 'rgba(255,255,255,0.1)',
    stroke: 'rgba(255,255,255,0.32)',
    alpha,
    blur: 6,
  });
  drawGlowText('NEW CONTACT', x + 20, y + 28, {
    size: 14, color: 'rgba(255,255,255,0.76)', weight: 600, letterSpacing: 2.4, glowBlur: 0, alpha,
  });
  drawGlowText(enemyCard.name.toUpperCase(), x + 20, y + 66, {
    size: 28, color: '#FFFFFF', weight: 700, letterSpacing: 2, glowBlur: 6, alpha,
  });
  for (let i = 0; i < enemyCard.lines.length; i++) {
    drawGlowText(enemyCard.lines[i], x + 20, y + 102 + i * 18, {
      size: 14, color: 'rgba(255,255,255,0.84)', weight: 500, letterSpacing: 0.8, glowBlur: 0, alpha,
    });
  }
}

function enterGameOver() {
  if (gameState === 'GAME_OVER') return;
  isNewBest = saveBestTime(survivalTime);
  gameState = 'GAME_OVER';
  mouseButtons.clear();
  pauseBgAudio();
}

function startGameFromIntro() {
  spores.length = 0;
  aoeFlashes.length = 0;
  explosions.length = 0;
  nutrients.length = 0;
  enemies.length = 0;
  deathParticles.length = 0;
  shockwaves.length = 0;
  burstWaveQueue.length = 0;
  flashEffects.length = 0;
  survivalTime = 0;
  ceasefireTimer = 0;
  attracting = false;
  shuttleLargeRespawnTimer = 0;
  burstWaveWindowTimer = 0;
  burstWaveWindowCount = 0;
  mouseButtons.clear();
  milestoneNotify.text = '';
  milestoneNotify.timer = 0;
  milestonesTriggered.clear();
  enemyCardShown.clear();
  enemyCard.active = false;
  enemyCard.timer = 0;
  isNewBest = false;
  resetStats();
  player.init();
  initTimeline();
  playBgAudio();
  gameStartTimer = 3;  // 3s buffer: player fade-in, enemies approach slowly
  player.invincibleTimer = 3;
  // Reset tutorial for first-time players
  tutorial.active = false;
  tutorial.nutrientTriggered = false;
  if (!tutorial.done) tutorial.step = 0;
  gameState = 'RUNNING';
  lastTime = performance.now();
}

// ── Input ─────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', e => mouseButtons.delete(e.button));

window.addEventListener('mousedown', e => {
  e.preventDefault();
  nudgeBgAudioPlayback();
  if (tutorial.active) { dismissTutorial(); return; }
  if (gameState === 'INTRO' && intro.clickReady) {
    startGameFromIntro();
    return;
  }
  if (gameState !== 'RUNNING') return;
  if (e.button === 2) {
    mouseButtons.add(e.button);
  }
});

window.addEventListener('keydown', e => {
  nudgeBgAudioPlayback();
  if (tutorial.active) return; // block game input during tutorial
  if (e.key === 'Escape') {
    if (e.repeat) return;
    if (gameState === 'RUNNING') {
      gameState = 'PAUSED';
      pauseBgAudio();
    } else if (gameState === 'PAUSED') {
      gameState = 'RUNNING';
      playBgAudio();
      lastTime = performance.now();
    }
    return;
  }
  if (e.key === ' ') {
    if (e.repeat) return;
    if (gameState === 'GAME_OVER') { resetGame(); return; }
    if (gameState === 'RUNNING') spaceDownAt = performance.now();
  }
  if (e.key.toLowerCase() === 'r' && gameState === 'GAME_OVER') resetGame();
});

window.addEventListener('keyup', e => {
  if (e.key === ' ' && gameState === 'RUNNING' && spaceDownAt > 0) {
    const held = performance.now() - spaceDownAt;
    spaceDownAt = 0;
    if (held < 180 && player.aoeCooldown <= 0 && player.shieldTimer <= 0) {
      player.shieldTimer = SHIELD_DURATION;
      player.aoeCooldown = SHIELD_COOLDOWN;
    }
  }
});

// ── Reset ─────────────────────────────────────────────────────
function resetGame() {
  spores.length = 0;
  aoeFlashes.length = 0;
  explosions.length = 0;
  nutrients.length = 0;
  enemies.length = 0;
  deathParticles.length = 0;
  shockwaves.length = 0;
  burstWaveQueue.length = 0;
  flashEffects.length = 0;
  survivalTime = 0;
  ceasefireTimer = 0;
  attracting = false;
  shuttleLargeRespawnTimer = 0;
  burstWaveWindowTimer = 0;
  burstWaveWindowCount = 0;
  gameState = 'RUNNING';
  camera.shakeX = 0;
  camera.shakeY = 0;
  camera.shakeIntensity = 0;
  camera.shakeDuration = 0;
  camera.shakeTimer = 0;
  mouseButtons.clear();
  resetStats();
  milestoneNotify.text = '';
  milestoneNotify.timer = 0;
  milestonesTriggered.clear();
  enemyCardShown.clear();
  enemyCard.active = false;
  enemyCard.timer = 0;
  isNewBest = false;
  player.init();
  initTimeline();
  initBgParticles();
  initSonarRings();
  playBgAudio(true);
  gameStartTimer = 3;
  player.invincibleTimer = 3;
  tutorial.active = false;
  tutorial.nutrientTriggered = false;
  // After first play, tutorial.done is already true via localStorage
  lastTime = performance.now();
}

// ── Game Loop ─────────────────────────────────────────────────
function gameLoop(ts) {
  const rawDt = Math.min((ts - lastTime) / 1000, 0.05);
  const dt    = DEV_MODE ? rawDt * devTimeScale : rawDt;
  lastTime = ts;
  camera.update(dt);

  drawSceneBackdrop(gameState === 'INTRO');

  if (gameState === 'INTRO') {
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
  }
  updateBgParticles(dt);
  drawBgParticles();
  if (gameState !== 'INTRO') drawCornerDecorations(true, 0.72);

  if (gameState === 'INTRO') {
    drawSonarRings();
    updateIntro(dt);
    drawIntro();
    requestAnimationFrame(gameLoop);
    return;
  }

  updateSonarRings(dt);
  drawSonarRings();

  if (gameState === 'RUNNING') {
    // ── Tutorial triggers ──────────────────────────────────────
    if (!SCREENSHOT_MODE && !tutorial.done && !tutorial.active) {
      if (tutorial.step === 0) {
        showTutorial(0);
      } else if (tutorial.step === 1) {
        // Trigger when any enemy is within screen bounds
        for (let i = 0; i < enemies.length; i++) {
          if (!enemies[i].active) continue;
          const ex = enemies[i].x, ey = enemies[i].y;
          if (ex > -50 && ex < canvas.width + 50 && ey > -50 && ey < canvas.height + 50) {
            showTutorial(1);
            tryShowEnemyCard('ShuttleLarge');
            break;
          }
        }
      } else if (tutorial.step === 2 && !tutorial.nutrientTriggered) {
        if (nutrients.length > 0) {
          tutorial.nutrientTriggered = true;
          showTutorial(2);
        }
      }
    }

    // Returning players: show ShuttleLarge card when first visible
    if (!SCREENSHOT_MODE && tutorial.done && !enemyCardShown.has('ShuttleLarge')) {
      for (let i = 0; i < enemies.length; i++) {
        if (!enemies[i].active || !(enemies[i] instanceof ShuttleLarge)) continue;
        const ex = enemies[i].x, ey = enemies[i].y;
        if (ex > -50 && ex < canvas.width + 50 && ey > -50 && ey < canvas.height + 50) {
          tryShowEnemyCard('ShuttleLarge');
          break;
        }
      }
    }

    // When tutorial popup is showing, freeze game but draw static frame
    if (!SCREENSHOT_MODE && tutorial.active) {
      drawRuntimeFrameStatic();
      drawHUD();
      drawTutorial();
      requestAnimationFrame(gameLoop);
      return;
    }

    if (gameStartTimer > 0) gameStartTimer = Math.max(0, gameStartTimer - dt);
    survivalTime += dt;
    if (burstWaveWindowTimer > 0) {
      burstWaveWindowTimer = Math.max(0, burstWaveWindowTimer - dt);
      if (burstWaveWindowTimer === 0) burstWaveWindowCount = 0;
    }
    updateTimeline(dt);
    ctx.save();
    ctx.translate(camera.shakeX, camera.shakeY);

    // Player
    player.update(dt);
    // Auto-fire toward mouse
    player.fireTimer -= dt;
    if (player.fireTimer <= 0 && !player.keys.has(' ')) {
      player.fireTimer = FIRE_INTERVAL;
      const fdx = mouseX - camera.shakeX - player.x, fdy = mouseY - camera.shakeY - player.y;
      const fd = Math.sqrt(fdx * fdx + fdy * fdy);
      if (fd > 0) {
        const fnx = fdx / fd, fny = fdy / fd;
        player.firedThisFrame = true;
        const dmg = getSporeDamage();
        const level = getWeaponLevel();
        const baseAngle = Math.atan2(fny, fnx);
        const speed = 600;
        const pierce = level >= 3 ? 2 : (level >= 2 ? 1 : 0);
        if (level === 0) {
          spores.push(new Spore(player.x, player.y, fnx * speed, fny * speed, dmg, pierce));
        } else if (level === 1) {
          const perpX = -fny, perpY = fnx;
          const off = 6;
          spores.push(new Spore(player.x + perpX * off, player.y + perpY * off, fnx * speed, fny * speed, dmg, pierce));
          spores.push(new Spore(player.x - perpX * off, player.y - perpY * off, fnx * speed, fny * speed, dmg, pierce));
        } else {
          const spreads = [-0.08, 0, 0.08];
          for (let i = 0; i < spreads.length; i++) {
            const a = baseAngle + spreads[i];
            spores.push(new Spore(player.x, player.y, Math.cos(a) * speed, Math.sin(a) * speed, dmg, pierce));
          }
        }
        camera.shake(2, 0.08);
        playShootSound();
      }
    }
    player.draw();

    // ── Absorb mode (Space held) ──────────────────────────────
    player.firedThisFrame = false;
    attracting = player.keys.has(' ');
    if (attracting) {
      ceasefireTimer += dt;
    } else {
      ceasefireTimer = 0;
    }

    // ── Nutrients: update age first, then apply gravity, then draw ──
    for (let i = nutrients.length - 1; i >= 0; i--) {
      const n = nutrients[i];
      // Apply gravity if attracting
      if (attracting && ceasefireTimer >= GRAVITY_WINDOW) {
        const d = dist(player.x, player.y, n.x, n.y);
        if (d < player.radius + n.radius + 2) {
          // Absorbed
          spawnAbsorbBurst(player.x, player.y);
          playNutrientPickupSound();
          n.active = false;
          nutrients.splice(i, 1);
          player.nutrientCount++;
          player.frenzyTimer = FRENZY_DURATION;
          player.absorbPulse = 0.15;

          queueBurstWavesCapped();

          stats.nutrientsCollected++;
          stats.maxWeaponLevel = Math.max(stats.maxWeaponLevel, getWeaponLevel());
          const milestones = [
            { count: 10, text: 'WEAPON EVOLVED — Lv.1' },
            { count: 30, text: 'WEAPON EVOLVED — Lv.2' },
            { count: 70, text: 'WEAPON EVOLVED — Lv.3' },
          ];
          for (const m of milestones) {
            if (player.nutrientCount >= m.count && !milestonesTriggered.has(m.count)) {
              milestonesTriggered.add(m.count);
              milestoneNotify.text = m.text;
              milestoneNotify.timer = milestoneNotify.maxTime;
              playWeaponUpgradeSound(m.count >= 70 ? 3 : (m.count >= 30 ? 2 : 1));
              camera.shake(8, 0.3);
              break;
            }
          }
          continue;
        } else {
          // Pull toward player, speed ramps up over time
          const spd = Math.min(200 + ceasefireTimer * 120, 600);
          n.vx = (player.x - n.x) / d * spd;
          n.vy = (player.y - n.y) / d * spd;
        }
      } else {
        // Not attracting: keep still
        n.vx = 0;
        n.vy = 0;
      }
      n.update(dt);
      if (!n.active) {
        nutrients.splice(i, 1);
        continue;
      }
      n.draw();
    }


    // ── Enemies ───────────────────────────────────────────────
    for (let i = enemies.length - 1; i >= 0; i--) {
      enemies[i].update(dt);
      if (!enemies[i].active) { enemies.splice(i, 1); continue; }
      enemies[i].draw();
    }

    // ── Burst waves ───────────────────────────────────────────
    for (let i = burstWaveQueue.length - 1; i >= 0; i--) {
      burstWaveQueue[i].delay -= dt;
      if (burstWaveQueue[i].delay <= 0) {
        const bullets = 12;
        const dmg = getSporeDamage();
        const speed = 520;
        for (let k = 0; k < bullets; k++) {
          const a = (k / bullets) * Math.PI * 2;
          const s = new Spore(
            player.x, player.y,
            Math.cos(a) * speed, Math.sin(a) * speed,
            dmg, 0
          );
          s.color = '#4488FF';
          s.radius = Math.max(5, s.radius + 1);
          s.glowSize = Math.max(s.glowSize, 22);
          spores.push(s);
        }
        camera.shake(5, 0.12);
        playShootSound();
        burstWaveQueue.splice(i, 1);
      }
    }

    // ── Spore vs enemy ────────────────────────────────────────
    for (let i = spores.length - 1; i >= 0; i--) {
      const s = spores[i];
      if (!s.active) continue;
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (!e.active) continue;
        if (s.hitEnemies.has(e)) continue;
        if (circlesOverlap(s, e)) {
          e.hp -= s.damage;
          e.hitFlash = 0.08;
          s.hitEnemies.add(e);
          applySporeKnockback(e, s);
          playHitSmallSound();

          if (e.hp <= 0) {
            handleEnemyDefeat(e);
          }

          if (s.isExplosive) {
            triggerExplosion(s.x, s.y, s.explosionRadius, s.damage);
            s.active = false;
            break;
          }

          if (s.pierce > 0) {
            s.pierce--;
          } else {
            s.active = false;
            break;
          }
        }
      }
    }

    // ── AOE explosions ────────────────────────────────────────
    for (let i = explosions.length - 1; i >= 0; i--) {
      const ex = explosions[i];
      for (let j = enemies.length - 1; j >= 0; j--) {
        if (!enemies[j].active) continue;
        if (dist(enemies[j].x, enemies[j].y, ex.x, ex.y) < ex.r + enemies[j].radius) {
          enemies[j].hp -= ex.dmg;
          enemies[j].hitFlash = 0.08;
          if (enemies[j].hp <= 0) {
            handleEnemyDefeat(enemies[j]);
          }
        }
      }
      explosions.splice(i, 1);
    }

    // ── Enemy vs player ───────────────────────────────────────
    if (!DEV_MODE && player.invincibleTimer <= 0) {
      for (let i = 0; i < enemies.length; i++) {
        if (!enemies[i].active) continue;
        const eHitR = enemies[i].hitRadius || enemies[i].radius;
        if (dist(enemies[i].x, enemies[i].y, player.x, player.y) < eHitR + player.radius) {
          // Skip Devourer during its attack cooldown
          if (enemies[i].attackCooldown > 0) continue;
          if (player.shieldTimer > 0) {
            const en = enemies[i];
            const isPerfect = player.shieldTimer > (SHIELD_DURATION - PERFECT_PARRY_WINDOW);
            const edx = en.x - player.x;
            const edy = en.y - player.y;
            const ed = Math.sqrt(edx * edx + edy * edy);
            if (ed > 0) {
              en.x += (edx / ed) * (isPerfect ? 300 : 200);
              en.y += (edy / ed) * (isPerfect ? 300 : 200);
            }
            player.shieldTimer = 0;
            player.shieldFlash = 0.3;
            player.invincibleTimer = 1.0;
            playShieldHitSound();
            // Devourer: enter 5s cooldown after contact
            if (en.attackCooldown !== undefined) {
              en.attackCooldown = 5;
              en.wanderAngle = Math.atan2(edy, edx) + (Math.random() - 0.5) * 1.0;
            }
            if (isPerfect) {
              // Perfect parry: AOE + reduced cooldown
              camera.shake(18, 0.4);
              shockwaves.push({ x: player.x, y: player.y, maxR: 130, t: 0.4, maxT: 0.4, color: '#FFD700' });
              shockwaves.push({ x: player.x, y: player.y, maxR: 70, t: 0.25, maxT: 0.25, color: '#FF9500' });
              spawnDeathExplosion(player.x, player.y, '#FFD700', 25, 100, 320, 2, 4, 0.45);
              player.aoeCooldown = Math.max(0, player.aoeCooldown - 1.5);
              for (let j = 0; j < enemies.length; j++) {
                if (!enemies[j].active || j === i) continue;
                const pd = dist(enemies[j].x, enemies[j].y, player.x, player.y);
                if (pd < 130) {
                  enemies[j].hp -= 10;
                  enemies[j].hitFlash = 0.15;
                  if (enemies[j].hp <= 0) {
                    enemies[j].active = false;
                    handleEnemyDefeat(enemies[j]);
                  }
                }
              }
            } else {
              camera.shake(12, 0.3);
              shockwaves.push({ x: player.x, y: player.y, maxR: 80, t: 0.3, maxT: 0.3, color: '#FF9500' });
              spawnDeathExplosion(player.x, player.y, '#FF9500', 15, 80, 250, 1.5, 3, 0.35);
            }
            break;
          } else {
            enterGameOver();
            break;
          }
        }
      }
    }

    // ── Spores ────────────────────────────────────────────────
    for (let i = spores.length - 1; i >= 0; i--) {
      spores[i].update(dt);
      if (!spores[i].active) { spores.splice(i, 1); continue; }
      spores[i].draw();
    }

    // ── AOE flashes ───────────────────────────────────────────
    for (let i = aoeFlashes.length - 1; i >= 0; i--) {
      const f = aoeFlashes[i];
      f.t -= dt;
      if (f.t <= 0) { aoeFlashes.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = (f.t / 0.3) * 0.4;
      ctx.strokeStyle = '#FF8800';
      ctx.shadowBlur  = 30;
      ctx.shadowColor = '#FF8800';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // ── HUD ───────────────────────────────────────────────────
    for (let i = flashEffects.length - 1; i >= 0; i--) {
      const f = flashEffects[i];
      f.life -= dt;
      if (f.life <= 0) {
        flashEffects.splice(i, 1);
        continue;
      }
      const alpha = f.life / f.maxLife;
      const radius = f.r * (1 + (1 - alpha) * 1.5);
      ctx.save();
      ctx.globalAlpha = alpha * 0.85;
      ctx.shadowBlur = radius * 2;
      ctx.shadowColor = f.color;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    for (let i = deathParticles.length - 1; i >= 0; i--) {
      deathParticles[i].update(dt);
      if (deathParticles[i].life <= 0) { deathParticles.splice(i, 1); continue; }
      deathParticles[i].draw();
    }
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const sw = shockwaves[i];
      sw.t -= dt;
      if (sw.t <= 0) { shockwaves.splice(i, 1); continue; }
      const progress = 1 - sw.t / sw.maxT;
      const r = sw.maxR * progress;
      const alpha = (1 - progress) * 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = sw.color;
      ctx.shadowBlur = 20;
      ctx.shadowColor = sw.color;
      ctx.lineWidth = Math.max(0.5, 4 * (1 - progress * 0.7));
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
    if (gameState === 'GAME_OVER') {
      drawGameOver();
      requestAnimationFrame(gameLoop);
      return;
    }
    drawHUD();
    drawMilestoneNotify(dt);
    updateAndDrawEnemyCard(dt);

  } else if (gameState === 'PAUSED') {
    drawRuntimeFrameStatic();
    drawHUD();
    drawPauseScreen();
  } else if (gameState === 'GAME_OVER') {
    drawRuntimeFrameStatic();
    drawGameOver();
  }

  // Custom cursor — simple circle
  ctx.save();
  ctx.globalAlpha = 0.7;
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  requestAnimationFrame(gameLoop);
}

function applyScreenshotMode() {
  if (!SCREENSHOT_MODE) return;

  resetStats();
  spores.length = 0;
  aoeFlashes.length = 0;
  explosions.length = 0;
  nutrients.length = 0;
  enemies.length = 0;
  deathParticles.length = 0;
  shockwaves.length = 0;
  burstWaveQueue.length = 0;
  flashEffects.length = 0;
  playerTrail.length = 0;
  mouseButtons.clear();
  tutorial.active = false;
  enemyCard.active = false;
  milestoneNotify.timer = 0;
  player.init();
  player.x = canvas.width * 0.58;
  player.y = canvas.height * 0.58;
  player.aoeCooldown = 0;
  player.nutrientCount = 0;
  survivalTime = 0;
  ceasefireTimer = GRAVITY_WINDOW;
  attracting = false;
  gameStartTimer = 0;
  isNewBest = false;
  initBgParticles();
  initSonarRings();

  if (SCREENSHOT_MODE === 'hud') {
    gameState = 'RUNNING';
    return;
  }

  if (SCREENSHOT_MODE === 'pause') {
    gameState = 'PAUSED';
    return;
  }

  if (SCREENSHOT_MODE === 'gameover') {
    gameState = 'GAME_OVER';
    survivalTime = 14;
    stats.totalKills = 13;
    stats.nutrientsCollected = 0;
    stats.maxWeaponLevel = 0;
    stats.kills.shuttleSmall = 13;
    stats.kills.shuttleLarge = 0;
    stats.kills.devourer = 0;
    stats.kills.jellyfish = 0;
    stats.kills.leviathan = 0;
    try { localStorage.setItem('abyssalSpores_bestTime', '103'); } catch (_) {}
  }
}

// ── Start ─────────────────────────────────────────────────────
resetIntroState();
resetStats();
initBgParticles();
initSonarRings();
playBgAudio(true);
applyScreenshotMode();
requestAnimationFrame(gameLoop);
</script>
