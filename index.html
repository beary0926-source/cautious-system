function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function drawGlowText(text, x, y, {
  size = 20, color = '#FFFFFF', glowColor = null, glowBlur = 12,
  align = 'left', baseline = 'alphabetic', weight = 700,
  letterSpacing = 2, alpha = 1, strokeColor = null, strokeWidth = 0,
} = {}) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = `${weight} ${size}px ${UI_FONT}`;
  ctx.textAlign = align;
  ctx.textBaseline = baseline;
  const chars = text.split('');
  let totalWidth = 0;
  for (const c of chars) totalWidth += ctx.measureText(c).width + letterSpacing;
  totalWidth -= letterSpacing;
  let startX = x;
  if (align === 'center') startX = x - totalWidth / 2;
  else if (align === 'right') startX = x - totalWidth;
  ctx.shadowColor = glowColor || color;
  ctx.shadowBlur = glowBlur * 0.6;
  ctx.fillStyle = color;
  let cx = startX;
  for (const c of chars) {
    if (strokeColor && strokeWidth > 0) {
      ctx.lineWidth = strokeWidth;
      ctx.strokeStyle = strokeColor;
      ctx.strokeText(c, cx, y);
    }
    ctx.fillText(c, cx, y);
    cx += ctx.measureText(c).width + letterSpacing;
  }
  ctx.restore();
}

function formatTime(t) {
  const mm = String(Math.floor(t / 60)).padStart(2, '0');
  const ss = String(Math.floor(t % 60)).padStart(2, '0');
  return mm + ':' + ss;
}

function drawCutCornerPath(x, y, w, h, cut = 16) {
  const c = Math.max(0, Math.min(cut, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + c, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + h - c);
  ctx.lineTo(x + w - c, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + c);
  ctx.closePath();
}

function drawPanelFrame(x, y, w, h, {
  cut = 16,
  alpha = 1,
  fill = UI_THEME.panel,
  stroke = UI_THEME.panelLineStrong,
  accent = null,
  accentWidth = 0,
  lineWidth = 1,
} = {}) {
  ctx.save();
  ctx.globalAlpha = alpha;
  if (fill) {
    drawCutCornerPath(x, y, w, h, cut);
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke && lineWidth > 0) {
    drawCutCornerPath(x, y, w, h, cut);
    ctx.strokeStyle = stroke;
    ctx.lineWidth = lineWidth;
    ctx.stroke();
  }
  if (accent && accentWidth > 0) {
    ctx.fillStyle = accent;
    ctx.fillRect(x, y, accentWidth, h);
  }
  ctx.restore();
}

function drawUiRule(x1, y1, x2, y2, {
  color = UI_THEME.panelLineStrong,
  alpha = 1,
  lineWidth = 1,
} = {}) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawUiOrbitalGauge(x, y, r, progress, {
  alpha = 1,
  color = UI_THEME.accent,
  trackColor = UI_THEME.panelLine,
  label = '',
  value = '',
  sublabel = '',
  pulse = 0,
} = {}) {
  const p = clamp01(progress);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = trackColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, r - 7, 0, Math.PI * 2);
  ctx.strokeStyle = colorWithAlpha(trackColor, 0.7);
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, r - 3, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * p);
  ctx.strokeStyle = color;
  ctx.lineWidth = 5;
  ctx.shadowBlur = 8 + pulse * 8;
  ctx.shadowColor = color;
  ctx.stroke();
  ctx.restore();

  if (label) {
    drawGlowText(label, x, y - r - 10, {
      size: 12, color: UI_THEME.textMute, weight: 600, letterSpacing: 2,
      align: 'center', glowBlur: 0, alpha,
    });
  }
  if (value) {
    drawGlowText(value, x, y + 4, {
      size: r > 28 ? 30 : 24, color: UI_THEME.text, weight: 700, letterSpacing: 2,
      align: 'center', baseline: 'middle', glowBlur: 0, alpha,
    });
  }
  if (sublabel) {
    drawGlowText(sublabel, x, y + r + 18, {
      size: 11, color: UI_THEME.textDim, weight: 500, letterSpacing: 2,
      align: 'center', glowBlur: 0, alpha,
    });
  }
}

function drawTopographicBlob(cx, cy, rx, ry, {
  loops = 3,
  rotation = 0,
  color = UI_THEME.text,
  alpha = 0.4,
} = {}) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);
  for (let ring = 0; ring < loops; ring++) {
    const inset = ring * 10;
    const w = Math.max(14, rx - inset);
    const h = Math.max(10, ry - inset * 0.8);
    ctx.beginPath();
    for (let i = 0; i <= 80; i++) {
      const angle = (i / 80) * Math.PI * 2;
      const wiggle = 1 + Math.sin(angle * 3 + ring * 0.8) * 0.08 + Math.cos(angle * 5 - ring * 0.7) * 0.04;
      const px = Math.cos(angle) * w * wiggle;
      const py = Math.sin(angle) * h * wiggle;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.globalAlpha = alpha * (1 - ring * 0.18);
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  ctx.restore();
}

function drawContourCluster(anchorX, anchorY, scale, alpha = 1) {
  drawTopographicBlob(anchorX, anchorY, 78 * scale, 28 * scale, {
    loops: 4,
    rotation: -0.85,
    color: colorWithAlpha(UI_THEME.text, 0.58),
    alpha: 0.45 * alpha,
  });
  drawTopographicBlob(anchorX + 120 * scale, anchorY + 52 * scale, 46 * scale, 20 * scale, {
    loops: 3,
    rotation: -0.55,
    color: colorWithAlpha(UI_THEME.text, 0.52),
    alpha: 0.4 * alpha,
  });
  drawTopographicBlob(anchorX - 120 * scale, anchorY - 38 * scale, 28 * scale, 16 * scale, {
    loops: 3,
    rotation: 0.95,
    color: colorWithAlpha(UI_THEME.text, 0.46),
    alpha: 0.34 * alpha,
  });

  ctx.save();
  ctx.fillStyle = UI_THEME.accent;
  for (let i = 0; i < 36; i++) {
    const angle = i * 0.55;
    const wave = 0.55 + (Math.sin(i * 1.73) + 1) * 0.22;
    const px = anchorX + Math.cos(angle) * 120 * scale * wave + Math.sin(i * 0.7) * 28 * scale;
    const py = anchorY + Math.sin(angle) * 58 * scale * wave + Math.cos(i * 1.1) * 18 * scale;
    const r = (1 + (i % 3) * 0.5) * scale;
    ctx.globalAlpha = (0.18 + (i % 5) * 0.05) * alpha;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawReflectedTitle(text, x, y, {
  size = 96,
  alpha = 1,
  color = UI_THEME.text,
  reflectGap = 10,
} = {}) {
  drawGlowText(text, x, y, {
    size, color, weight: 700, letterSpacing: 2.5, align: 'center',
    glowBlur: 10, alpha,
  });
  ctx.save();
  ctx.translate(0, y * 2 + reflectGap);
  ctx.scale(1, -1);
  ctx.globalAlpha = alpha * 0.22;
  drawGlowText(text, x, y, {
    size, color, weight: 700, letterSpacing: 2.5, align: 'center',
    glowBlur: 4, alpha: 1,
  });
  ctx.restore();
}

function drawSceneBackdrop(isIntro) {
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (isIntro) {
    gradient.addColorStop(0, '#31d2c7');
    gradient.addColorStop(0.55, '#2bc8c0');
    gradient.addColorStop(1, '#0f6d73');
  } else {
    gradient.addColorStop(0, '#03161b');
    gradient.addColorStop(0.55, '#041d23');
    gradient.addColorStop(1, '#01080b');
  }
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const bloom = ctx.createRadialGradient(
    canvas.width * 0.55, canvas.height * 0.38, 0,
    canvas.width * 0.55, canvas.height * 0.38, Math.max(canvas.width, canvas.height) * 0.72
  );
  if (isIntro) {
    bloom.addColorStop(0, 'rgba(255,255,255,0.12)');
    bloom.addColorStop(0.45, 'rgba(123,255,241,0.08)');
    bloom.addColorStop(1, 'rgba(0,0,0,0)');
  } else {
    bloom.addColorStop(0, 'rgba(67, 195, 191, 0.08)');
    bloom.addColorStop(0.55, 'rgba(20, 98, 104, 0.05)');
    bloom.addColorStop(1, 'rgba(0,0,0,0)');
  }
  ctx.fillStyle = bloom;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawRoundedPanel(x, y, w, h, {
  radius = 18,
  fill = 'rgba(7, 14, 22, 0.52)',
  stroke = 'rgba(255,255,255,0.18)',
  alpha = 1,
  blur = 0,
} = {}) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, radius);
  if (fill) {
    ctx.fillStyle = fill;
    ctx.fill();
  }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.4;
    if (blur > 0) {
      ctx.shadowBlur = blur;
      ctx.shadowColor = stroke;
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawCornerDecorations(isBright = false, alpha = 1) {
  const lineColor = isBright ? 'rgba(255,255,255,0.34)' : 'rgba(255,255,255,0.16)';
  const dotColor = UI_THEME.accent;
  drawTopographicBlob(canvas.width * 0.06, canvas.height * 0.63, 54, 20, {
    loops: 3,
    rotation: -0.85,
    color: lineColor,
    alpha: 0.34 * alpha,
  });
  drawTopographicBlob(canvas.width * 0.08, canvas.height * 0.91, 36, 18, {
    loops: 2,
    rotation: 0.9,
    color: lineColor,
    alpha: 0.28 * alpha,
  });
  drawTopographicBlob(canvas.width * 0.95, canvas.height * 0.42, 46, 22, {
    loops: 3,
    rotation: 0.2,
    color: lineColor,
    alpha: 0.26 * alpha,
  });
  drawTopographicBlob(canvas.width * 0.92, canvas.height * 0.97, 62, 24, {
    loops: 3,
    rotation: 0.3,
    color: lineColor,
    alpha: 0.32 * alpha,
  });

  ctx.save();
  ctx.fillStyle = dotColor;
  const clusters = [
    [canvas.width * 0.175, canvas.height * 0.935],
    [canvas.width * 0.95, canvas.height * 0.86],
    [canvas.width * 0.045, canvas.height * 0.56],
  ];
  for (const cluster of clusters) {
    for (let i = 0; i < 18; i++) {
      const px = cluster[0] + Math.cos(i * 0.72) * (18 + (i % 5) * 8);
      const py = cluster[1] + Math.sin(i * 0.91) * (10 + (i % 4) * 6);
      const r = 1.5 + (i % 3) * 1.4;
      ctx.globalAlpha = (0.14 + (i % 5) * 0.06) * alpha;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawMinimalLabelValue(label, value, x, y, {

  small = 18,

}

function refX(px) {
  return canvas.width * (px / 1365);
}

function refY(py) {
  return canvas.height * (py / 768);
}

function refSize(px) {
  return Math.min(canvas.width / 1365, canvas.height / 768) * px;
}

function ensureBgAudio() {
  if (bgAudio.initialized) return;
  if (typeof Audio === 'undefined') {
    bgAudio.initialized = true;
    bgAudio.tracks = [];
    return;
  }
  bgAudio.tracks = [
    { audio: new Audio('audio/water_underwater_deep_001.mp3'), volume: 0.22 },
    { audio: new Audio('audio/water_underwater_deep_002.mp3'), volume: 0.14 },
  ];
  for (const track of bgAudio.tracks) {
    track.audio.loop = true;
    track.audio.preload = 'auto';
    track.audio.volume = track.volume;
  }
  bgAudio.initialized = true;
}

function playBgAudio(resetToStart = false) {
  ensureBgAudio();
  for (const track of bgAudio.tracks) {
    if (resetToStart) track.audio.currentTime = 0;
    track.audio.volume = track.volume;
    const playPromise = track.audio.play();
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch(() => {});
    }
  }
}

function nudgeBgAudioPlayback() {
  if (gameState === 'PAUSED' || gameState === 'GAME_OVER') return;

}

function pauseBgAudio() {

function stopBgAudio(resetToStart = false) {
  if (!bgAudio.initialized) return;
  for (const track of bgAudio.tracks) {

}

function ensureSfxAudio() {
  if (sfxAudio.initialized) return;
  const AudioCtor =
    (typeof window !== 'undefined' && (window.AudioContext || window.webkitAudioContext)) ||
    (typeof globalThis !== 'undefined' && (globalThis.AudioContext || globalThis.webkitAudioContext));

  if (!AudioCtor) {
    sfxAudio.initialized = true;
    return;
  }

  sfxAudio.ctx = new AudioCtor();
  sfxAudio.master = sfxAudio.ctx.createGain();
  sfxAudio.master.gain.value = 0.14;
  sfxAudio.master.connect(sfxAudio.ctx.destination);
  sfxAudio.initialized = true;
}

function resumeSfxAudio() {
  ensureSfxAudio();
  if (!sfxAudio.ctx || typeof sfxAudio.ctx.resume !== 'function') return;
  if (sfxAudio.ctx.state === 'suspended') {
    const resumePromise = sfxAudio.ctx.resume();
    if (resumePromise && typeof resumePromise.catch === 'function') {
      resumePromise.catch(() => {});
    }
  }
}

function scheduleSfxTone(time, {
  type = 'sine',
  startFreq,
  endFreq = startFreq,
  duration = 0.12,
  peak = 0.12,
  attack = 0.008,
  release = 0.08,
}) {
  if (!sfxAudio.ctx || !sfxAudio.master) return;
  const osc = sfxAudio.ctx.createOscillator();
  const gain = sfxAudio.ctx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(Math.max(20, startFreq), time);
  if (endFreq !== startFreq) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), time + duration);
  }

  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.linearRampToValueAtTime(peak, time + attack);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + Math.max(attack + 0.02, duration + release));

  osc.connect(gain);
  gain.connect(sfxAudio.master);
  osc.start(time);
  osc.stop(time + duration + release + 0.03);
}

function playNutrientPickupSound() {
  const stamp = (typeof performance !== 'undefined' && typeof performance.now === 'function')
    ? performance.now()
    : Date.now();
  if (stamp - lastNutrientSfxAt < 45) return;
  lastNutrientSfxAt = stamp;

  ensureSfxAudio();
  resumeSfxAudio();
  if (!sfxAudio.ctx) return;

  const t = sfxAudio.ctx.currentTime;
  scheduleSfxTone(t, {
    type: 'sine',
    startFreq: 240,
    endFreq: 420,
    duration: 0.08,
    peak: 0.09,
    attack: 0.005,
    release: 0.05,
  });
  scheduleSfxTone(t + 0.01, {
    type: 'triangle',
    startFreq: 160,
    endFreq: 230,
    duration: 0.11,
    peak: 0.05,
    attack: 0.006,
    release: 0.07,
  });
}

function playWeaponUpgradeSound(level) {
  ensureSfxAudio();
  resumeSfxAudio();
  if (!sfxAudio.ctx) return;

  const t = sfxAudio.ctx.currentTime;
  const sequences = {
    1: [420, 560, 720],
    2: [460, 620, 820],
    3: [520, 700, 940],
  };
  const freqs = sequences[level] || [460, 620, 820];
  for (let i = 0; i < freqs.length; i++) {
    scheduleSfxTone(t + i * 0.055, {
      type: i === freqs.length - 1 ? 'triangle' : 'sine',
      startFreq: freqs[i],
      endFreq: freqs[i] * 1.06,
      duration: 0.14,
      peak: 0.11 + i * 0.015,
      attack: 0.008,
      release: 0.12,
    });
  }
}

function queueBurstWavesCapped() {
  if (burstWaveWindowTimer <= 0) {
    burstWaveWindowTimer = 0;
    burstWaveWindowCount = 0;
  }

  const available = Math.max(0, MAX_BURST_WAVES_PER_WINDOW - burstWaveWindowCount);
  const wavesToQueue = Math.min(BURST_WAVES_PER_ABSORB, available);
  if (wavesToQueue <= 0) return;

  const lastDelay = burstWaveQueue.length > 0
    ? Math.max(...burstWaveQueue.map(w => w.delay))
    : -BURST_WAVE_INTERVAL;
  const baseDelay = Math.max(0, lastDelay + BURST_WAVE_INTERVAL);

  for (let i = 0; i < wavesToQueue; i++) {
    burstWaveQueue.push({ delay: baseDelay + i * BURST_WAVE_INTERVAL });
  }

  burstWaveWindowCount += wavesToQueue;
  burstWaveWindowTimer = BURST_WAVE_STACK_WINDOW;
}

function updateAndDrawEnemyCard(dt) {
  if (!enemyCard.active) return;
  const totalTime = enemyCard.fadeInTime + enemyCard.stayTime + enemyCard.fadeOutTime;
  enemyCard.timer += dt;
  if (enemyCard.timer >= totalTime) {
    enemyCard.active = false;
    return;
  }

  let alpha = 1;
  if (enemyCard.timer < enemyCard.fadeInTime) {
    alpha = enemyCard.timer / enemyCard.fadeInTime;
  } else if (enemyCard.timer > enemyCard.fadeInTime + enemyCard.stayTime) {
    alpha = 1 - (enemyCard.timer - enemyCard.fadeInTime - enemyCard.stayTime) / enemyCard.fadeOutTime;
  }

  const x = 30;
  const y = canvas.height / 2 - 80;
  const cardH = 40 + enemyCard.lines.length * 18;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + cardH);
  ctx.stroke();
  ctx.restore();

  drawGlowText('NEW CONTACT', x + 18, y + 20, {
    size: 10, color: 'rgba(255,255,255,0.5)', weight: 700, letterSpacing: 4, glowBlur: 0, alpha,
  });

    size: 22, color: '#FFFFFF', weight: 900, letterSpacing: 3,
    glowBlur: 0, alpha,
  });

    drawGlowText(enemyCard.lines[i], x + 18, y + 80 + i * 18, {
      size: 12, color: 'rgba(255,255,255,0.7)', weight: 500, letterSpacing: 1,
      glowBlur: 0, alpha: alpha * 0.85,
    });
  }
}

const camera = {
  shakeX: 0,
  shakeY: 0,
  shakeIntensity: 0,
  shakeDuration: 0,
  shakeTimer: 0,

  shake(intensity, duration) {
    if (intensity > this.shakeIntensity) {
      this.shakeIntensity = intensity;
      this.shakeDuration = duration;
      this.shakeTimer = 0;
    }
  },

  update(dt) {
    if (this.shakeIntensity <= 0) {
      this.shakeX = 0;
      this.shakeY = 0;
      return;
    }
    this.shakeTimer += dt;
    if (this.shakeTimer >= this.shakeDuration) {
      this.shakeIntensity = 0;
      this.shakeX = 0;
      this.shakeY = 0;
      return;
    }
    const decay = 1 - this.shakeTimer / this.shakeDuration;
    const angle = Math.random() * Math.PI * 2;
    this.shakeX = Math.cos(angle) * this.shakeIntensity * decay;
    this.shakeY = Math.sin(angle) * this.shakeIntensity * decay;
  }
};

function drawRing(x, y, radius, color, glowBlur, lineWidth) {
  ctx.save();
  ctx.shadowBlur  = glowBlur || 0;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth   = lineWidth || 2;
  ctx.beginPath();
  ctx.arc(x, y, Math.max(0.5, radius), 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function colorWithAlpha(color, alpha) {
  if (typeof color === 'string' && color[0] === '#' && color.length === 7) {
    const r = parseInt(color.slice(1, 3), 16);
    const g = parseInt(color.slice(3, 5), 16);
    const b = parseInt(color.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  return color;
}

// Multi-layer soft bloom circle (used for player and spores)
function drawGlowCircle(x, y, r, color, glowSize) {
  ctx.save();
  ctx.shadowBlur  = glowSize * 2.5;
  ctx.shadowColor = color;
  ctx.strokeStyle = colorWithAlpha(color, 0.12);
  ctx.lineWidth   = r * 0.9;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.6, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.shadowBlur  = glowSize * 1.2;
  ctx.shadowColor = color;
  ctx.strokeStyle = colorWithAlpha(color, 0.35);
  ctx.lineWidth   = r * 0.55;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.shadowBlur  = glowSize * 0.7;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth   = r * 0.45;
  ctx.beginPath();
  ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// Diamond shape helper (used for shuttles)
function drawDiamondShape(cx, cy, sx, sy, fillColor, strokeColor, strokeW, blur) {
  ctx.save();
  ctx.shadowBlur  = blur;
  ctx.shadowColor = strokeColor || fillColor;
  ctx.beginPath();
  ctx.moveTo(cx,      cy - sy);
  ctx.lineTo(cx + sx, cy);
  ctx.lineTo(cx,      cy + sy);
  ctx.lineTo(cx - sx, cy);
  ctx.closePath();
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor && strokeW > 0) { ctx.strokeStyle = strokeColor; ctx.lineWidth = strokeW; ctx.stroke(); }
  ctx.restore();
}

// Devourer segment helper
function drawDevourerSegment(x, y, r, alpha) {
  if (r < 1) return;
  ctx.save();
  const baseAlpha = ctx.globalAlpha;
  ctx.globalAlpha = baseAlpha * alpha;
  // Outer soft bloom
  ctx.shadowBlur  = r * 2.5; ctx.shadowColor = '#00FFEE';
  ctx.strokeStyle = 'rgba(0,255,238,0.15)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  // Mid glow
  ctx.shadowBlur  = r * 1.2;
  ctx.strokeStyle = 'rgba(0,255,238,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  // Crisp ring
  ctx.shadowBlur  = r * 0.5;
  ctx.strokeStyle = '#00FFEE'; ctx.lineWidth = Math.max(1, r * 0.12);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}

function dist(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx * dx + dy * dy);
}

function circlesOverlap(a, b) {
  return dist(a.x, a.y, b.x, b.y) < a.radius + b.radius;
}

class DeathParticle {
  constructor(x, y, color, speed, angle, size, life) {
    this.x = x;
    this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = color;
    this.size = size;
    this.life = life;
    this.maxLife = life;
  }
  update(dt) {
    this.life -= dt;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    const r = this.size * (0.5 + 0.5 * alpha);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = r * 3;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function getEnemyKnockbackStrength(enemy) {
  if (typeof ShuttleSmall !== 'undefined' && enemy instanceof ShuttleSmall) return 20;
  if (typeof ShuttleLarge !== 'undefined' && enemy instanceof ShuttleLarge) return 5;
  if (typeof Devourer !== 'undefined' && enemy instanceof Devourer) return 10;
  if (typeof Jellyfish !== 'undefined' && enemy instanceof Jellyfish) return 8;
  if (typeof Leviathan !== 'undefined' && enemy instanceof Leviathan) return 3;
  return 10;
}

function applySporeKnockback(enemy, spore) {
  const bulletSpeed = Math.sqrt(spore.vx * spore.vx + spore.vy * spore.vy);
  if (bulletSpeed <= 0) return;
  const knockback = getEnemyKnockbackStrength(enemy);
  enemy.x += (spore.vx / bulletSpeed) * knockback;
  enemy.y += (spore.vy / bulletSpeed) * knockback;
}

function handleEnemyDefeat(enemy) {
  stats.totalKills++;
  if (typeof ShuttleSmall !== 'undefined' && enemy instanceof ShuttleSmall) stats.kills.shuttleSmall++;
  else if (typeof ShuttleLarge !== 'undefined' && enemy instanceof ShuttleLarge) stats.kills.shuttleLarge++;
  else if (typeof Devourer !== 'undefined' && enemy instanceof Devourer) stats.kills.devourer++;
  else if (typeof Jellyfish !== 'undefined' && enemy instanceof Jellyfish) stats.kills.jellyfish++;
  else if (typeof Leviathan !== 'undefined' && enemy instanceof Leviathan) stats.kills.leviathan++;

  if (typeof ShuttleSmall !== 'undefined' && enemy instanceof ShuttleSmall) camera.shake(3, 0.1);
  else if (typeof ShuttleLarge !== 'undefined' && enemy instanceof ShuttleLarge) camera.shake(6, 0.2);
  else if (typeof Devourer !== 'undefined' && enemy instanceof Devourer) camera.shake(8, 0.25);
  else if (typeof Jellyfish !== 'undefined' && enemy instanceof Jellyfish) camera.shake(10, 0.3);
  else if (typeof Leviathan !== 'undefined' && enemy instanceof Leviathan) camera.shake(14, 0.4);
  enemy.onDeath();
  enemy.active = false;
}

function initBgParticles() {

  for (let i = 0; i < BG_COUNT; i++) {

      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,

    });

function initSonarRings() {
  sonarRings.length = 0;
  SONAR_CONFIG.maxRadius = Math.max(canvas.width, canvas.height) * 0.75;
  const spacing = SONAR_CONFIG.maxRadius / SONAR_CONFIG.ringCount;
  for (let i = 0; i < SONAR_CONFIG.ringCount; i++) {
    sonarRings.push({ r: spacing * i });
  }
}

function updateSonarRings(dt) {
  for (let i = 0; i < sonarRings.length; i++) {
    sonarRings[i].r += SONAR_CONFIG.expandSpeed * dt;
    if (sonarRings[i].r > SONAR_CONFIG.maxRadius) {
      sonarRings[i].r = 0;
    }
  }
}

function drawSonarRings() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  for (let ri = 0; ri < sonarRings.length; ri++) {
    const baseR = sonarRings[ri].r;
    if (baseR < 5) continue;
    const progress = baseR / SONAR_CONFIG.maxRadius;
    const alpha = SONAR_CONFIG.baseAlpha * (1 - progress * 0.7);
    if (alpha <= 0.003) continue;

    const segments = 120;
    const points = [];
    for (let s = 0; s < segments; s++) {
      const angle = (s / segments) * Math.PI * 2;
      let px = cx + Math.cos(angle) * baseR;
      let py = cy + Math.sin(angle) * baseR;

      for (let ei = 0; ei < enemies.length; ei++) {
        const e = enemies[ei];
        if (!e.active) continue;
        const dx = px - e.x;
        const dy = py - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const influence = e.radius * 1.8;
        if (d < influence && d > 0) {
          const strength = (1 - d / influence) * e.radius * 0.6;
          px += (dx / d) * strength;
          py += (dy / d) * strength;
        }
      }

      const dpx = px - player.x;
      const dpy = py - player.y;
      const dp = Math.sqrt(dpx * dpx + dpy * dpy);
      const playerInfluence = player.radius * 4;
      if (dp < playerInfluence && dp > 0) {
        const strength = (1 - dp / playerInfluence) * player.radius * 0.8;
        px += (dpx / dp) * strength;
        py += (dpy / dp) * strength;
      }

      points.push({ x: px, y: py });
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = SONAR_CONFIG.glowBlur;
    ctx.shadowColor = SONAR_CONFIG.glowColor;
    ctx.strokeStyle = SONAR_CONFIG.color;
    ctx.lineWidth = SONAR_CONFIG.lineWidth;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let p = 1; p < points.length; p++) {
      ctx.lineTo(points[p].x, points[p].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

function updateBgParticles(dt) {
  for (let i = 0; i < bgParticles.length; i++) {
    const p = bgParticles[i];
    // Brownian nudge
    p.vx += (Math.random() - 0.5) * 30 * dt;
    p.vy += (Math.random() - 0.5) * 30 * dt;
    // Dampen
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;
    // Wrap
    if (p.x < 0) p.x += canvas.width;
    else if (p.x > canvas.width)  p.x -= canvas.width;
    if (p.y < 0) p.y += canvas.height;
    else if (p.y > canvas.height) p.y -= canvas.height;

    // Repel from player
    const dp = dist(p.x, p.y, player.x, player.y);
    const frenzyBonus = player.frenzyTimer > 0 ? 40 : 0;
    const pr = player.radius + p.r + 10 + frenzyBonus;
    if (dp < pr && dp > 0) {
      const f = (pr - dp) * (player.frenzyTimer > 0 ? 8 : 4);
      p.vx += (p.x - player.x) / dp * f;
      p.vy += (p.y - player.y) / dp * f;
    }
    // Repel from enemies
    for (let j = 0; j < enemies.length; j++) {
      const e = enemies[j];
      if (!e.active) continue;
      const de = dist(p.x, p.y, e.x, e.y);
      const er = e.radius + p.r + 6;
      if (de < er && de > 0) {
        const f = (er - de) * 2;
        p.vx += (p.x - e.x) / de * f;
        p.vy += (p.y - e.y) / de * f;
      }
    }
  }
}

function drawBgParticles() {
  ctx.save();
  for (let i = 0; i < bgParticles.length; i++) {
    const p = bgParticles[i];
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle   = '#3a5a6a';
    ctx.shadowBlur  = 3;
    ctx.shadowColor = '#4488aa';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── Player trail ──────────────────────────────────────────────
const playerTrail = [];

function spawnPlayerTrail() {
  const spd = Math.sqrt(
    (player.vx || 0) * (player.vx || 0) + (player.vy || 0) * (player.vy || 0)
  );
  if (spd < 20) return;
  for (let i = 0; i < 2; i++) {
    const angle = Math.atan2(player.vy || 0, player.vx || 0) + Math.PI + (Math.random()-0.5)*0.5;
    playerTrail.push({
      x: player.x + (Math.random()-0.5)*player.radius,
      y: player.y + (Math.random()-0.5)*player.radius,
      vx: Math.cos(angle)*(30+Math.random()*50),
      vy: Math.sin(angle)*(30+Math.random()*50),
      life: 0.35+Math.random()*0.25,
      maxLife: 0.35+Math.random()*0.25,
      r: 1.5+Math.random()*2
    });
  }
}

// ── Player ────────────────────────────────────────────────────
const player = {
  x: 0, y: 0,
  radius: 10,
  speed: 300,
  frenzyTimer: 0,
  frenzyPulseTimer: 0,
  nutrientCount: 0,
  aoeCooldown: 0,
  shieldTimer: 0,
  shieldFlash: 0,
  invincibleTimer: 0,
  absorbPulse: 0,
  firedThisFrame: false,
  fireTimer: 0,
  vx: 0, vy: 0,
  keys: new Set(),

  init() {
    this.x = canvas.width  / 2;
    this.y = canvas.height / 2;
    this.frenzyTimer    = 0;
    this.frenzyPulseTimer = 0;
    this.nutrientCount  = 0;
    this.aoeCooldown    = 0;
    this.shieldTimer    = 0;
    this.shieldFlash    = 0;
    this.invincibleTimer = 0;
    this.absorbPulse    = 0;
    this.firedThisFrame = false;
    this.fireTimer = 0;
    this.vx = 0; this.vy = 0;
    playerTrail.length = 0;
  },

  update(dt) {
    let dx = 0, dy = 0;
    if (this.keys.has('w') || this.keys.has('arrowup'))    dy -= 1;
    if (this.keys.has('s') || this.keys.has('arrowdown'))  dy += 1;
    if (this.keys.has('a') || this.keys.has('arrowleft'))  dx -= 1;
    if (this.keys.has('d') || this.keys.has('arrowright')) dx += 1;
    if (dx !== 0 && dy !== 0) {
      const inv = 1 / Math.sqrt(2);
      dx *= inv; dy *= inv;
    }
    const spaceHeld = this.keys.has(' ');
    let currentSpeed = this.frenzyTimer > 0 ? this.speed * 1.4 : this.speed;
    if (spaceHeld) currentSpeed *= 1.6;
    this.vx = dx * currentSpeed;
    this.vy = dy * currentSpeed;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.x = Math.max(this.radius, Math.min(canvas.width  - this.radius, this.x));
    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
    if (this.frenzyTimer > 0) this.frenzyTimer = Math.max(0, this.frenzyTimer - dt);
    if (this.frenzyTimer > 0) this.frenzyPulseTimer += dt;
    else this.frenzyPulseTimer = 0;
    if (this.aoeCooldown > 0) this.aoeCooldown = Math.max(0, this.aoeCooldown - dt);
    if (this.shieldTimer > 0) this.shieldTimer = Math.max(0, this.shieldTimer - dt);
    if (this.shieldFlash > 0) this.shieldFlash = Math.max(0, this.shieldFlash - dt);
    if (this.invincibleTimer > 0) this.invincibleTimer = Math.max(0, this.invincibleTimer - dt);
    if (this.absorbPulse > 0) this.absorbPulse = Math.max(0, this.absorbPulse - dt);
  },

  draw() {
    // Update & draw trail
    spawnPlayerTrail();
    for (let i = playerTrail.length - 1; i >= 0; i--) {
      const p = playerTrail[i];
      p.life -= 0.016; // approximate dt
      if (p.life <= 0) { playerTrail.splice(i, 1); continue; }
      p.x += p.vx * 0.016; p.y += p.vy * 0.016;
      p.vx *= 0.90; p.vy *= 0.90;
      const alpha = (p.life / p.maxLife) * 0.6;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowBlur = 8; ctx.shadowColor = '#FF9500';
      ctx.fillStyle = '#FF9500';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    const drawRadius = this.radius + (this.absorbPulse > 0 ? 4 * (this.absorbPulse / 0.15) : 0);
    if (this.frenzyTimer > 0) {
      const pulsePhase = (this.frenzyPulseTimer % 0.4) / 0.4;
      const pulseR = drawRadius + pulsePhase * 60;
      const pulseAlpha = (1 - pulsePhase) * 0.4;
      ctx.save();
      ctx.globalAlpha = pulseAlpha;
      ctx.strokeStyle = '#FFD700';
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#FFD700';
      ctx.lineWidth = 2 * (1 - pulsePhase);
      ctx.beginPath();
      ctx.arc(this.x, this.y, pulseR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();

      const pulsePhase2 = ((this.frenzyPulseTimer + 0.2) % 0.4) / 0.4;
      const pulseR2 = drawRadius + pulsePhase2 * 60;
      const pulseAlpha2 = (1 - pulsePhase2) * 0.25;
      ctx.save();
      ctx.globalAlpha = pulseAlpha2;
      ctx.strokeStyle = '#FFAA00';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#FFAA00';
      ctx.lineWidth = 1.5 * (1 - pulsePhase2);
      ctx.beginPath();
      ctx.arc(this.x, this.y, pulseR2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    const glowSize = this.frenzyTimer > 0 ? 50 : 25;
    const playerColor = this.frenzyTimer > 0 ? '#FFD700' : '#FF9500';
    drawGlowCircle(this.x, this.y, drawRadius, playerColor, glowSize);
    // Shield active: prominent radial glow
    if (this.shieldTimer > 0) {
      const shieldAlpha = this.shieldTimer / SHIELD_DURATION;
      // Outer soft bloom
      ctx.save();
      ctx.globalAlpha = shieldAlpha * 0.35;
      ctx.shadowBlur = 30;
      ctx.shadowColor = '#FF9500';
      const sg2 = ctx.createRadialGradient(this.x, this.y, drawRadius, this.x, this.y, drawRadius + 45);
      sg2.addColorStop(0, 'rgba(255,149,0,0.3)');
      sg2.addColorStop(1, 'rgba(255,149,0,0)');
      ctx.fillStyle = sg2;
      ctx.beginPath();
      ctx.arc(this.x, this.y, drawRadius + 45, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Inner bright core
      ctx.save();
      ctx.globalAlpha = shieldAlpha * 0.85;
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#FF9500';
      const sg = ctx.createRadialGradient(this.x, this.y, drawRadius * 0.2, this.x, this.y, drawRadius + 28);
      sg.addColorStop(0, 'rgba(255,200,100,0.7)');
      sg.addColorStop(0.4, 'rgba(255,149,0,0.4)');
      sg.addColorStop(0.8, 'rgba(255,149,0,0.1)');
      sg.addColorStop(1, 'rgba(255,149,0,0)');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.arc(this.x, this.y, drawRadius + 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Crisp ring edge
      ctx.save();
      ctx.globalAlpha = shieldAlpha * 0.6;
      ctx.strokeStyle = 'rgba(255,200,120,0.7)';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#FF9500';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(this.x, this.y, drawRadius + 22, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    // Successful parry flash: bright radial burst
    if (this.shieldFlash > 0) {
      const flashAlpha = this.shieldFlash / 0.3;
      ctx.save();
      ctx.globalAlpha = flashAlpha * 0.85;
      ctx.shadowBlur = 25;
      ctx.shadowColor = '#FFD700';
      const fr = drawRadius + 50 * (1 - flashAlpha);
      const fg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, fr);
      fg.addColorStop(0, 'rgba(255,220,130,0.95)');
      fg.addColorStop(0.3, 'rgba(255,180,60,0.5)');
      fg.addColorStop(0.7, 'rgba(255,149,0,0.15)');
      fg.addColorStop(1, 'rgba(255,149,0,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.arc(this.x, this.y, fr, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Absorb mode glow (Space held)
    if (this.keys.has(' ')) {
      const pulse = 0.5 + 0.2 * Math.sin(Date.now() * 0.006);
      ctx.save();
      ctx.globalAlpha = pulse * 0.45;
      const ag = ctx.createRadialGradient(this.x, this.y, drawRadius * 0.5, this.x, this.y, drawRadius + 40);
      ag.addColorStop(0, 'rgba(68,136,255,0.5)');
      ag.addColorStop(0.6, 'rgba(68,136,255,0.15)');
      ag.addColorStop(1, 'rgba(68,136,255,0)');
      ctx.fillStyle = ag;
      ctx.beginPath();
      ctx.arc(this.x, this.y, drawRadius + 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    // Invincibility: soft pulsing radial glow
    if (this.invincibleTimer > 0) {
      const invAlpha = Math.min(1, this.invincibleTimer / 0.3) * (0.3 + 0.3 * Math.sin(Date.now() * 0.015));
      ctx.save();
      ctx.globalAlpha = invAlpha;
      const ig = ctx.createRadialGradient(this.x, this.y, drawRadius, this.x, this.y, drawRadius + 22);
      ig.addColorStop(0, 'rgba(255,149,0,0.35)');
      ig.addColorStop(1, 'rgba(255,149,0,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.arc(this.x, this.y, drawRadius + 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
};

window.addEventListener('keydown', e => player.keys.add(e.key.toLowerCase()));
window.addEventListener('keyup',   e => player.keys.delete(e.key.toLowerCase()));

// ── Spore ─────────────────────────────────────────────────────
class Spore {
  constructor(x, y, vx, vy, damage, pierce) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.damage = damage || 1;
    this.pierce = pierce || 0;
    this.active = true;
    this.hitEnemies = new Set();
    this.isExplosive = false;
    this.explosionRadius = 0;
    this.level = 0;
    this.color = '#FFFFFF';
    this.glowSize = 14;
    this.trailLen = 0;
    this.trail = [];

    const level = getWeaponLevel();
    if (level >= 3) {
      this.level = 3;
      this.radius = 7;
      this.color = '#FFFFFF';
      this.glowSize = 35;
      this.trailLen = 6;
    } else if (level >= 2) {
      this.level = 2;
      this.radius = 6;
      this.color = '#FFFFFF';
      this.glowSize = 28;
      this.trailLen = 4;
    } else if (level >= 1) {
      this.level = 1;
      this.radius = 5;
      this.color = '#FFFFFF';
      this.glowSize = 20;
      this.trailLen = 2;
    } else {
      this.radius = 4;
    }

    if (player.frenzyTimer > 0) {
      this.color = '#FFFFFF';
      this.glowSize = Math.max(this.glowSize, 30);
    }
  }
  update(dt) {
    if (this.trailLen > 0) {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > this.trailLen) this.trail.shift();
    }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    if (this.x < -50 || this.x > canvas.width  + 50 ||
        this.y < -50 || this.y > canvas.height + 50) {
      this.active = false;
    }
  }
  draw() {
    if (!this.active) return;
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed === 0) return;

    const ux = this.vx / speed;
    const uy = this.vy / speed;
    const tailLength = [10, 14, 20, 28][Math.min(this.level, 3)];
    const tailX = this.x - ux * tailLength;
    const tailY = this.y - uy * tailLength;

    if (this.isExplosive) {
      ctx.save();
      ctx.shadowBlur = 35;
      ctx.shadowColor = '#FF8800';
      ctx.strokeStyle = 'rgba(255,136,0,0.9)';
      ctx.lineWidth = this.radius * 1.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - ux * 14, this.y - uy * 14);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#FFCC00';
      ctx.strokeStyle = '#FFCC00';
      ctx.lineWidth = this.radius * 0.7;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - ux * 8, this.y - uy * 8);
      ctx.stroke();
      ctx.restore();
      return;
    }

    // Comet tail: outer glow fade
    const trailGrad = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
    trailGrad.addColorStop(0, colorWithAlpha(this.color, 0));
    trailGrad.addColorStop(0.5, colorWithAlpha(this.color, 0.10));
    trailGrad.addColorStop(1, colorWithAlpha(this.color, 0.40));
    ctx.save();
    ctx.shadowBlur = this.glowSize * 1.2;
    ctx.shadowColor = this.color;
    ctx.strokeStyle = trailGrad;
    ctx.lineWidth = this.radius * 2.0;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    ctx.restore();

    // Comet tail: inner bright core fade
    const coreGrad = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
    coreGrad.addColorStop(0, colorWithAlpha(this.color, 0));
    coreGrad.addColorStop(0.6, colorWithAlpha(this.color, 0.45));
    coreGrad.addColorStop(1, colorWithAlpha('#FFFFFF', 0.9));
    ctx.save();
    ctx.strokeStyle = coreGrad;
    ctx.lineWidth = Math.max(1, this.radius * 0.45);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    ctx.restore();

    // Comet head: soft bloom
    ctx.save();
    ctx.shadowBlur = this.glowSize * 2.0;
    ctx.shadowColor = this.color;
    ctx.fillStyle = colorWithAlpha(this.color, 0.22);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Comet head: solid fill
    ctx.save();
    ctx.shadowBlur = this.glowSize * 0.9;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Comet head: bright white core
    ctx.save();
    ctx.shadowBlur = this.glowSize * 0.4;
    ctx.shadowColor = '#FFFFFF';
    ctx.fillStyle = '#FFFFFF';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (this.level >= 3 && Math.random() < 0.35) {
      deathParticles.push(new DeathParticle(
        this.x + (Math.random() - 0.5) * 5,
        this.y + (Math.random() - 0.5) * 5,
        '#FFFFFF',
        15 + Math.random() * 35,
        Math.random() * Math.PI * 2,
        0.8 + Math.random() * 1.2,
        0.12 + Math.random() * 0.1
      ));
    }
  }
}

// ── Nutrient ──────────────────────────────────────────────────
class Nutrient {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 4;
    this.age    = 0;
    this.active = true;
    this.vx = 0; this.vy = 0;
    this.trail = [];
  }
  update(dt) {
    if (attracting && (this.vx !== 0 || this.vy !== 0)) {
      this.trail.push({ x: this.x, y: this.y, age: 0 });
      if (this.trail.length > 8) this.trail.shift();
    }
    for (let i = this.trail.length - 1; i >= 0; i--) {
      this.trail[i].age += dt;
      if (this.trail[i].age > 0.15) this.trail.splice(i, 1);
    }
    this.age += dt;
    if (this.age >= NUTRIENT_LIFE) { this.active = false; return; }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
  draw() {
    const alpha = Math.max(0, 1 - this.age / NUTRIENT_LIFE);
    if (alpha <= 0) return;
    for (let i = 0; i < this.trail.length; i++) {
      const tr = this.trail[i];
      const trailAlpha = (1 - tr.age / 0.15) * 0.4 * alpha;
      ctx.save();
      ctx.globalAlpha = trailAlpha;
      ctx.fillStyle = '#4488FF';
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, 2 + (1 - tr.age / 0.15) * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    // Outer glow
    ctx.globalAlpha = alpha * 0.18;
    ctx.fillStyle = '#4488FF';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#4488FF';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3.2, 0, Math.PI * 2);
    ctx.fill();

    // Mid glow
    ctx.globalAlpha = alpha * 0.4;
    ctx.fillStyle = '#4488FF';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.globalAlpha = alpha * 1.0;
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#88BBFF';
    ctx.fillStyle = '#AADDFF';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1.0;
    ctx.restore();
  }
}

// ── ShuttleSmall ──────────────────────────────────────────────
class ShuttleSmall {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 15;
    this.hp     = Math.ceil(1 * getHpScale());
    this.maxHp  = this.hp;
    this.active = true;
    this.hitFlash = 0;
    this.vx = (Math.random() - 0.5) * 80;
    this.vy = (Math.random() - 0.5) * 80;
  }
  update(dt) {
    if (this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - dt);
    const SEP = 40, PLAYER_F = 100;
    let sepX = 0, sepY = 0;
    for (let i = 0; i < enemies.length; i++) {
      const n = enemies[i];
      if (n === this || !(n instanceof ShuttleSmall) || !n.active) continue;
      const d = dist(this.x, this.y, n.x, n.y);
      if (d < SEP && d > 0) {
        sepX += (this.x - n.x) / d * (SEP - d);
        sepY += (this.y - n.y) / d * (SEP - d);
      }
    }
    const pd = dist(this.x, this.y, player.x, player.y);
    const pFX = pd > 0 ? (player.x - this.x) / pd * PLAYER_F : 0;
    const pFY = pd > 0 ? (player.y - this.y) / pd * PLAYER_F : 0;
    this.vx += (sepX * 0.2 + pFX) * dt;
    this.vy += (sepY * 0.2 + pFY) * dt;
    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > 200) { this.vx = this.vx / spd * 200; this.vy = this.vy / spd * 200; }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
  }
  onDeath() {
    spawnDeathFlash(this.x, this.y, SHUTTLE_STYLE.core, 20);
    spawnDeathExplosion(this.x, this.y, SHUTTLE_STYLE.core, 18, 100, 280, 1.5, 3.5, 0.45);
    spawnDeathExplosion(this.x, this.y, '#FFFFFF', 6, 60, 180, 0.8, 2, 0.3);
  }
  draw() {
    const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 0;
    const hpAlpha = 0.3 + 0.7 * Math.max(0, Math.min(1, hpRatio));
    const flickerAlpha = getHitFlickerAlpha(this.hitFlash);
    const baseColor = SHUTTLE_STYLE.core;
    const R = 12;
    const pulse = 0.92 + 0.08 * Math.sin(Date.now() * 0.003 + this.x * 0.01);
    ctx.save();
    ctx.translate(this.x, this.y);

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.12 * pulse;
    ctx.fillStyle = SHUTTLE_STYLE.glow;
    ctx.beginPath();
    ctx.arc(0, 0, R * 1.9, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.82;
    ctx.fillStyle = SHUTTLE_STYLE.center;
    ctx.strokeStyle = SHUTTLE_STYLE.line;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.55;
    ctx.strokeStyle = SHUTTLE_STYLE.lineSoft;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, R * 0.72, 0.35, Math.PI * 1.55);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, R * 0.42, 0.75, Math.PI * 1.25);
    ctx.stroke();

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.65;
    ctx.strokeStyle = SHUTTLE_STYLE.line;
    ctx.lineWidth = 1.1;
    for (let i = 0; i < 3; i++) {
      const angle = -0.25 + i * 0.25;
      const y = (i - 1) * 3;
      const len = 5 + Math.sin(Date.now() * 0.004 + i + this.y * 0.01) * 1.5;
      ctx.beginPath();
      ctx.moveTo(R * 0.82, y);
      ctx.lineTo(R * 0.82 + Math.cos(angle) * len, y + Math.sin(angle) * len);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── ShuttleLarge ──────────────────────────────────────────────
class ShuttleLarge {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 50;
    this.hitRadius = 28;
    this.hp     = Math.ceil(30 * getHpScale());
    this.maxHp  = this.hp;
    this.active = true;
    this.hitFlash = 0;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    this.R0    = dist(x, y, cx, cy);
    this.angle = Math.atan2(y - cy, x - cx);
    this.omega = -0.5;  // negative = clockwise in canvas coords
    this.v_in  = 20;    // inward speed px/s
    this.t     = 0;
    this.spawnTimer        = 0;
    this.nutrientDropTimer = 0;
    this.shellAngle = Math.random() * Math.PI * 2;
  }
  update(dt) {
    if (this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - dt);
    this.t += dt;
    this.shellAngle += 0.4 * dt;
    this.spawnTimer        += dt;
    this.nutrientDropTimer += dt;
    // Archimedean spiral: r shrinks over time, clockwise rotation
    let r = this.R0 - this.v_in * this.t;
    if (r < this.radius + 10) {
      // Reached center — respawn at edge and restart spiral
      const a = Math.random() * Math.PI * 2;
      const ex = canvas.width  / 2 + Math.cos(a) * (canvas.width  / 2 - 80);
      const ey = canvas.height / 2 + Math.sin(a) * (canvas.height / 2 - 80);
      this.R0    = dist(ex, ey, canvas.width / 2, canvas.height / 2);
      this.angle = Math.atan2(ey - canvas.height / 2, ex - canvas.width / 2);
      this.t     = 0;
      r = this.R0;
    }
    const cx = canvas.width / 2, cy = canvas.height / 2;
    this.x = cx + r * Math.cos(this.omega * this.t + this.angle);
    this.y = cy + r * Math.sin(this.omega * this.t + this.angle);
    if (this.spawnTimer >= SHUTTLE_LARGE_HATCH_INTERVAL) {
      this.spawnTimer = 0;
      const smallCount = enemies.filter(e => e instanceof ShuttleSmall && e.active).length;
      if (smallCount < SHUTTLE_SMALL_CAP) {
        const count = 2 + Math.floor(Math.random() * 2);
        const actualCount = Math.min(count, SHUTTLE_SMALL_CAP - smallCount);
        for (let k = 0; k < actualCount; k++) {
          enemies.push(new ShuttleSmall(this.x, this.y));
        }
        tryShowEnemyCard('ShuttleSmall');
      }
    }
    if (this.nutrientDropTimer >= 60) {
      this.nutrientDropTimer = 0;
      nutrients.push(new Nutrient(this.x, this.y));
    }
  }
  onDeath() {
    nutrients.push(new Nutrient(
      this.x + (Math.random() - 0.5) * 20,
      this.y + (Math.random() - 0.5) * 20
    ));
    spawnDeathFlash(this.x, this.y, SHUTTLE_STYLE.core, 60);
    spawnDeathExplosion(this.x, this.y, SHUTTLE_STYLE.core, 45, 120, 420, 2, 5.5, 0.75);
    spawnDeathExplosion(this.x, this.y, '#FFFFFF', 15, 80, 250, 1, 3, 0.5);
    shockwaves.push({ x: this.x, y: this.y, maxR: 120, t: 0.5, maxT: 0.5, color: SHUTTLE_STYLE.core });
  }
  draw() {
    const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 0;
    const hpAlpha = 0.3 + 0.7 * Math.max(0, Math.min(1, hpRatio));
    const flickerAlpha = getHitFlickerAlpha(this.hitFlash);
    const baseColor = SHUTTLE_STYLE.core;
    const R = 22;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.shellAngle);

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.12;
    ctx.fillStyle = SHUTTLE_STYLE.glow;
    ctx.beginPath();
    ctx.arc(0, 0, R * 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.85;
    ctx.fillStyle = SHUTTLE_STYLE.center;
    ctx.strokeStyle = SHUTTLE_STYLE.line;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.6;
    ctx.strokeStyle = SHUTTLE_STYLE.lineSoft;
    ctx.lineWidth = 1;
    const chambers = [
      { r: R * 0.75, startAngle: 0.3, endAngle: Math.PI * 1.6 },
      { r: R * 0.50, startAngle: 0.6, endAngle: Math.PI * 1.4 },
      { r: R * 0.28, startAngle: 0.9, endAngle: Math.PI * 1.2 },
    ];
    for (const c of chambers) {
      ctx.beginPath();
      ctx.arc(0, 0, c.r, c.startAngle, c.endAngle);
      ctx.stroke();
    }

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.7;
    ctx.strokeStyle = SHUTTLE_STYLE.line;
    ctx.lineWidth = 1.2;
    for (let i = 0; i < 5; i++) {
      const angle = -0.4 + i * 0.2;
      const len = 8 + Math.sin(this.t * 3 + i) * 3;
      const y = (i - 2) * 4;
      ctx.beginPath();
      ctx.moveTo(R * 0.9, y);
      ctx.lineTo(R * 0.9 + Math.cos(angle) * len, y + Math.sin(angle) * len);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Devourer ──────────────────────────────────────────────────
// Snake-like entity: head uses sine-wave tracking, body segments follow
class Devourer {
  constructor(x, y) {
    this.radius  = 20;
    this.hp      = Math.ceil(60 * getHpScale());
    this.maxHp   = this.hp;
    this.active  = true;
    this.color   = '#00FFEE';
    this.hitFlash = 0;
    // Head position
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    // Sine-wave motion state
    this.t       = 0;
    this.v_base  = 224;
    this.amp     = 112;
    this.freq    = 0.6;  // Hz
    this.segments = Array.from({ length: 10 }, () => ({ x, y }));
    this.segmentSpacing = 20;
    this.attackCooldown = 0;
    this.wanderAngle = Math.random() * Math.PI * 2;
  }

  update(dt) {
    if (this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - dt);
    if (this.attackCooldown > 0) this.attackCooldown = Math.max(0, this.attackCooldown - dt);
    this.t += dt;

    let nx, ny;
    if (this.attackCooldown > 0) {
      // Wander away: drift in wanderAngle direction
      nx = Math.cos(this.wanderAngle);
      ny = Math.sin(this.wanderAngle);
      // Gently curve the wander angle
      this.wanderAngle += (Math.sin(this.t * 1.2) * 0.8) * dt;
    } else {
      // Chase player
      const dx = player.x - this.x, dy = player.y - this.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d === 0) return;
      nx = dx / d; ny = dy / d;
    }
    // Perpendicular for sine wave
    const perpX = -ny, perpY = nx;
    const sineOffset = this.amp * Math.sin(2 * Math.PI * this.freq * this.t);
    this.x += nx * this.v_base * dt + perpX * sineOffset * dt * 4;
    this.y += ny * this.v_base * dt + perpY * sineOffset * dt * 4;
    // Keep in bounds
    this.x = Math.max(-100, Math.min(canvas.width + 100, this.x));
    this.y = Math.max(-100, Math.min(canvas.height + 100, this.y));
    const last = this.segments[0];
    if (!last || Math.hypot(this.x - last.x, this.y - last.y) >= this.segmentSpacing) {
      this.segments.unshift({ x: this.x, y: this.y });
      if (this.segments.length > 10) this.segments.pop();
    }
  }

  onDeath() {
    for (let k = 0; k < 2; k++) {
      nutrients.push(new Nutrient(
        this.x + (Math.random() - 0.5) * 30,
        this.y + (Math.random() - 0.5) * 30
      ));
    }
    spawnDeathFlash(this.x, this.y, '#00FFEE', 130);
    spawnDeathExplosion(this.x, this.y, '#00FFEE', 90, 150, 560, 2.5, 7, 0.85);
    spawnDeathExplosion(this.x, this.y, '#66FFDD', 30, 80, 260, 1.2, 4, 0.6);
    spawnDeathExplosion(this.x, this.y, '#FFFFFF', 14, 110, 340, 0.9, 2.4, 0.45);
    shockwaves.push({ x: this.x, y: this.y, maxR: 220, t: 0.55, maxT: 0.55, color: '#00FFEE' });
    shockwaves.push({ x: this.x, y: this.y, maxR: 120, t: 0.4, maxT: 0.4, color: '#66FFDD' });
  }

  draw() {
    const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 0;
    const hpAlpha = 0.3 + 0.7 * Math.max(0, Math.min(1, hpRatio));
    const flickerAlpha = getHitFlickerAlpha(this.hitFlash);
    const baseColor = '#00FFEE';
    ctx.save();
    for (let i = this.segments.length - 1; i >= 0; i--) {
      const seg = this.segments[i];
      const t = i / Math.max(1, this.segments.length - 1);
      const r = 14 - t * 8;

      ctx.globalAlpha = hpAlpha * flickerAlpha * 0.18;
      ctx.fillStyle = baseColor;
      ctx.beginPath();
      ctx.arc(seg.x, seg.y, r * 2.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = hpAlpha * flickerAlpha * (0.5 + 0.5 * (1 - t));
      ctx.fillStyle = baseColor;
      ctx.beginPath();
      ctx.arc(seg.x, seg.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.3;
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 32, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = hpAlpha * flickerAlpha;
    ctx.fillStyle = '#AAFFFF';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Jellyfish ─────────────────────────────────────────────────
class Jellyfish {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius     = 100;  // 10x player
    this.baseRadius = 100;
    this.hitRadius   = 50;
    this.hp         = Math.ceil(100 * getHpScale());
    this.maxHp      = this.hp;
    this.active     = true;
    this.color      = '#80FF40';
    this.hitFlash = 0;
    this.t          = 0;
    this.T          = 2;      // pulse period seconds
    this.V_max      = 450;    // peak speed px/s
    this.lambda     = 1.8;    // damping
    // Direction locked at pulse start
    this.dirX = 0; this.dirY = 0;
  }

  update(dt) {
    if (this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - dt);
    this.t += dt;
    const t_mod = this.t % this.T;
    // At pulse start, lock direction toward player
    if (t_mod < dt * 1.5) {
      const dx = player.x - this.x, dy = player.y - this.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d > 0) { this.dirX = dx / d; this.dirY = dy / d; }
    }
    const spd = this.V_max * Math.exp(-this.lambda * t_mod);
    this.x += this.dirX * spd * dt;
    this.y += this.dirY * spd * dt;
    // Visual scale: contract at pulse, expand during glide
    const pulseFrac = t_mod / this.T;
    if (pulseFrac < 0.1) {
      this.radius = this.baseRadius * (0.6 + pulseFrac / 0.1 * 0.4);
    } else {
      this.radius = this.baseRadius;
    }
  }

  onDeath() {
    for (let k = 0; k < 3; k++) {
      nutrients.push(new Nutrient(
        this.x + (Math.random() - 0.5) * 40,
        this.y + (Math.random() - 0.5) * 40
      ));
    }
    spawnDeathFlash(this.x, this.y, '#80FF40', 110);
    spawnDeathExplosion(this.x, this.y, '#80FF40', 65, 110, 450, 2.5, 7, 0.9);
    spawnDeathExplosion(this.x, this.y, '#BBFF88', 25, 70, 250, 1.5, 4, 0.65);
    spawnDeathExplosion(this.x, this.y, '#FFFFFF', 15, 50, 180, 0.6, 2, 0.4);
    shockwaves.push({ x: this.x, y: this.y, maxR: 220, t: 0.6, maxT: 0.6, color: '#80FF40' });
    shockwaves.push({ x: this.x, y: this.y, maxR: 130, t: 0.45, maxT: 0.45, color: '#80FF40' });
    shockwaves.push({ x: this.x, y: this.y, maxR: 60,  t: 0.3,  maxT: 0.3,  color: '#FFFFFF' });
  }

  draw() {
    const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 0;
    const hpAlpha = 0.3 + 0.7 * Math.max(0, Math.min(1, hpRatio));
    ctx.save();
    ctx.globalAlpha = hpAlpha * getHitFlickerAlpha(this.hitFlash);
    const moveAngle = Math.atan2(this.dirY, this.dirX);
    const r = this.radius * 0.45;
    const pts = [];
    for (let i = 0; i < 5; i++) {
      const a = moveAngle + (i / 5) * Math.PI * 2;
      pts.push({
        x: this.x + Math.cos(a) * r,
        y: this.y + Math.sin(a) * r,
      });
    }

    ctx.save();
    ctx.shadowBlur = 35;
    ctx.shadowColor = '#80FF40';
    ctx.strokeStyle = 'rgba(128,255,64,0.15)';
    ctx.lineWidth = 10;
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#80FF40';
    ctx.strokeStyle = 'rgba(128,255,64,0.5)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#80FF40';
    ctx.strokeStyle = '#80FF40';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.stroke();
    ctx.restore();

    const tentSegs = 8;
    const tentLen = this.radius * 0.9;
    const trailX = -this.dirX;
    const trailY = -this.dirY;
    const perpX = -this.dirY;
    const perpY = this.dirX;

    for (let i = 0; i < 5; i++) {
      const v = pts[i];
      let tx = v.x;
      let ty = v.y;
      for (let s = 0; s < tentSegs; s++) {
        const prog = (s + 1) / tentSegs;
        const swing = Math.sin(this.t * 2.8 + i * 1.26 + s * 0.6) * prog * 0.5;
        const spread = (i - 2) * 0.08 * prog;
        const segLen = tentLen / tentSegs;
        const nx2 = tx + (trailX + perpX * (swing + spread)) * segLen;
        const ny2 = ty + (trailY + perpY * (swing + spread)) * segLen;
        const alpha = 0.85 - prog * 0.55;
        const lw = Math.max(0.5, 1.8 - prog * 1.0);
        const blur = Math.max(4, 14 - prog * 8);
        jfGline(tx, ty, nx2, ny2, lw, blur, alpha);
        if (s % 2 === 1) {
          jfGcircle(nx2, ny2, Math.max(0.8, 2.2 - prog * 1.2), alpha * 0.6);
        }
        tx = nx2;
        ty = ny2;
      }
    }

    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = 'rgba(0,255,255,0.4)';
    ctx.fillStyle = 'rgba(0,255,255,0.06)';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }
}

// ── Leviathan ─────────────────────────────────────────────────
// Uses 2D curl noise (finite-difference Simplex approximation) + player drift
class Leviathan {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 80;
    this.hp     = Math.ceil(80 * getHpScale());
    this.maxHp  = this.hp;
    this.active = true;
    this.color  = '#FF3060';
    this.hitFlash = 0;
    this.vx = 0; this.vy = 0;
    this.noiseOffset = Math.random() * 1000;
    this.speed  = 95;
    this.alpha  = 0.35;
    this._lt    = 0;
    this.moveAngle = 0;
    this.prevX = this.x;
    this.prevY = this.y;
    this.glideTimer = 0;
    this.glideCooldown = 6 + Math.random() * 4;
    this.gliding = false;
    this.glideDuration = 0;
  }

  _noise(x, y) {
    const X = Math.floor(x), Y = Math.floor(y);
    const fx = x - X, fy = y - Y;
    const u = fx * fx * (3 - 2 * fx), v = fy * fy * (3 - 2 * fy);
    const h = (n) => {
      let s = Math.sin(n * 127.1 + 311.7) * 43758.5453;
      return s - Math.floor(s);
    };
    return h(X + Y * 57) * (1-u) * (1-v)
         + h(X+1 + Y * 57) * u * (1-v)
         + h(X + (Y+1) * 57) * (1-u) * v
         + h(X+1 + (Y+1) * 57) * u * v;
  }

  update(dt) {
    if (this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - dt);
    this.glideTimer += dt;
    if (!this.gliding && this.glideTimer > this.glideCooldown) {
      this.gliding = true;
      this.glideDuration = 0.8;
      this.glideTimer = 0;
      this.glideCooldown = 6 + Math.random() * 4;
    }
    if (this.gliding) {
      this.glideDuration -= dt;
      if (this.glideDuration <= 0) this.gliding = false;
    }
    const scale = 0.0008;
    const eps   = 1.0;
    const nx = this.x * scale + this.noiseOffset;
    const ny = this.y * scale + this.noiseOffset;
    // Curl: dN/dy, -dN/dx
    const curlX =  (this._noise(nx, ny + eps) - this._noise(nx, ny - eps)) / (2 * eps);
    const curlY = -(this._noise(nx + eps, ny) - this._noise(nx - eps, ny)) / (2 * eps);
    // Direction toward player
    const dx = player.x - this.x, dy = player.y - this.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    const pX = d > 0 ? dx / d : 0, pY = d > 0 ? dy / d : 0;
    // Blend
    const finalX = (1 - this.alpha) * curlX + this.alpha * pX;
    const finalY = (1 - this.alpha) * curlY + this.alpha * pY;
    const mag = Math.sqrt(finalX * finalX + finalY * finalY);
    const glideMultiplier = this.gliding ? 2.2 : 1.0;
    if (mag > 0) {
      this.vx = finalX / mag * this.speed * glideMultiplier;
      this.vy = finalY / mag * this.speed * glideMultiplier;
    }
    this.prevX = this.x;
    this.prevY = this.y;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    const dxMove = this.x - this.prevX;
    const dyMove = this.y - this.prevY;
    if (Math.abs(dxMove) > 0.1 || Math.abs(dyMove) > 0.1) {
      const targetAngle = Math.atan2(dyMove, dxMove);
      let diff = targetAngle - this.moveAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      this.moveAngle += diff * Math.min(1, 3 * dt);
    }
    this._lt += dt;
  }

  onDeath() {
    for (let k = 0; k < 5; k++) {
      nutrients.push(new Nutrient(
        this.x + (Math.random() - 0.5) * 60,
        this.y + (Math.random() - 0.5) * 60
      ));
    }
    spawnDeathFlash(this.x, this.y, '#FF3060', 180);
    spawnDeathExplosion(this.x, this.y, '#FF3060', 90, 150, 600, 3, 8, 1.1);
    spawnDeathExplosion(this.x, this.y, '#FF5544', 35, 100, 350, 2, 5, 0.85);
    spawnDeathExplosion(this.x, this.y, '#FF8866', 20, 80, 250, 1.5, 3.5, 0.6);
    spawnDeathExplosion(this.x, this.y, '#FFFFFF', 15, 120, 400, 1, 2.5, 0.5);
    shockwaves.push({ x: this.x, y: this.y, maxR: 380, t: 0.8, maxT: 0.8, color: '#FF3060' });
    shockwaves.push({ x: this.x, y: this.y, maxR: 250, t: 0.6, maxT: 0.6, color: '#FF5544' });
    shockwaves.push({ x: this.x, y: this.y, maxR: 140, t: 0.45, maxT: 0.45, color: '#FF8866' });
    shockwaves.push({ x: this.x, y: this.y, maxR: 60,  t: 0.3,  maxT: 0.3,  color: '#FFFFFF' });
    camera.shake(18, 0.5);
  }

  draw() {
    const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 0;
    const hpAlpha = 0.3 + 0.7 * Math.max(0, Math.min(1, hpRatio));
    const flickerAlpha = getHitFlickerAlpha(this.hitFlash);
    const baseColor = '#FF3060';
    const edgeColor = '#FF8899';
    const visualScale = 1.95;
    const finPulseA = Math.sin(this._lt * 2.7);
    const finPulseB = Math.cos(this._lt * 2.15 + 0.8);
    const drift = Math.sin(this._lt * 1.4) * 3;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.moveAngle);
    ctx.scale(visualScale, visualScale);

    const fillPoly = (points, alpha, fillStyle, strokeStyle = null, lineWidth = 1) => {
      ctx.globalAlpha = hpAlpha * flickerAlpha * alpha;
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
      ctx.closePath();
      ctx.fill();
      if (strokeStyle) {
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
    };

    const outerWing = [
      [18, 0],
      [8, -24 - finPulseA * 4],
      [-8, -42 - finPulseA * 8],
      [-42, -58 - finPulseA * 10],
      [-78, -44 - finPulseB * 6],
      [-72, -10 - finPulseB * 4],
      [-48, 18 + drift],
      [-72, 44 + finPulseA * 6],
      [-42, 58 + finPulseA * 10],
      [-8, 42 + finPulseA * 8],
      [8, 24 + finPulseA * 4],
    ];

    const midWing = [
      [18, 0],
      [6, -18 - finPulseA * 3],
      [-10, -34 - finPulseA * 6],
      [-34, -46 - finPulseA * 7],
      [-60, -34 - finPulseB * 4],
      [-55, -8 - finPulseB * 3],
      [-34, 0],
      [-55, 8 + finPulseB * 3],
      [-60, 34 + finPulseB * 4],
      [-34, 46 + finPulseA * 7],
      [-10, 34 + finPulseA * 6],
      [6, 18 + finPulseA * 3],
    ];

    const coreBody = [
      [20, 0],
      [10, -10],
      [-6, -24 - finPulseA * 2],
      [-26, -28 - finPulseA * 2],
      [-38, -10],
      [-28, 0],
      [-38, 10],
      [-26, 28 + finPulseA * 2],
      [-6, 24 + finPulseA * 2],
      [10, 10],
    ];

    fillPoly(outerWing, 0.16, 'rgba(255, 40, 70, 0.95)');
    fillPoly(midWing, 0.32, 'rgba(255, 78, 102, 0.95)', 'rgba(255, 180, 190, 0.45)', 1);
    fillPoly(coreBody, 0.8, 'rgba(255, 120, 138, 0.98)', edgeColor, 1.2);

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.72;
    ctx.fillStyle = 'rgba(255, 205, 214, 0.92)';
    ctx.beginPath();
    ctx.moveTo(14, -4);
    ctx.lineTo(28, -14);
    ctx.lineTo(20, -2);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(14, 4);
    ctx.lineTo(28, 14);
    ctx.lineTo(20, 2);
    ctx.closePath();
    ctx.fill();

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.48;
    ctx.strokeStyle = edgeColor;
    ctx.lineWidth = this.gliding ? 2.3 : 1.7;
    ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      const sway = Math.sin(this._lt * 3 + i * 0.7) * 5;
      const startX = -32 - i * 6;
      const startY = -8 + i * 8;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.quadraticCurveTo(-48 - i * 8, startY + sway, -72 - i * 10, startY + sway * 0.6);
      ctx.stroke();
    }

    ctx.globalAlpha = hpAlpha * flickerAlpha * 0.09;
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(6, -20);
    ctx.lineTo(-16, -30);
    ctx.lineTo(-54, -38);
    ctx.lineTo(-72, 0);
    ctx.lineTo(-54, 38);
    ctx.lineTo(-16, 30);
    ctx.lineTo(6, 20);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

// ── Timeline ──────────────────────────────────────────────────
let devourerSpawnTimer  = 0;
let jellyfishSpawnTimer = 0;
let leviathanSpawnTimer = 0;
let shuttleLargeRespawnTimer = 0;

function spawnOffscreen(cls) {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * canvas.width; y = -150; }
  else if (side === 1) { x = canvas.width + 150; y = Math.random() * canvas.height; }
  else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 150; }
  else { x = -150; y = Math.random() * canvas.height; }
  enemies.push(new cls(x, y));
  if (cls && cls.name) tryShowEnemyCard(cls.name);
}

function updateTimeline(dt) {
  const t1 = DEV_MODE ? 60  : 60;   // Devourer:  1min
  const t2 = DEV_MODE ? 120 : 120;  // Jellyfish: 2min
  const t3 = DEV_MODE ? 180 : 180;  // Leviathan: 3min

  const largeCount = enemies.filter(e => e instanceof ShuttleLarge && e.active).length;
  if (largeCount < SHUTTLE_LARGE_MIN) {
    if (largeCount === 0) {
      if (enemies.filter(e => e instanceof ShuttleLarge && e.active).length < SHUTTLE_LARGE_MAX) {
        spawnOffscreen(ShuttleLarge);
      }
      shuttleLargeRespawnTimer = 0;
    } else {
      shuttleLargeRespawnTimer += dt;
      if (shuttleLargeRespawnTimer >= SHUTTLE_LARGE_RESPAWN_INTERVAL) {
        shuttleLargeRespawnTimer = 0;
        if (enemies.filter(e => e instanceof ShuttleLarge && e.active).length < SHUTTLE_LARGE_MAX) {
          spawnOffscreen(ShuttleLarge);
        }
      }
    }
  } else {
    shuttleLargeRespawnTimer = 0;
  }

  if (survivalTime >= t1) {
    devourerSpawnTimer += dt;
    if (devourerSpawnTimer >= 20) { devourerSpawnTimer = 0; spawnOffscreen(Devourer); }
  }
  if (survivalTime >= t2) {
    jellyfishSpawnTimer += dt;
    if (jellyfishSpawnTimer >= 25) { jellyfishSpawnTimer = 0; spawnOffscreen(Jellyfish); }
  }
  if (survivalTime >= t3) {
    leviathanSpawnTimer += dt;
    if (leviathanSpawnTimer >= 40) {
      leviathanSpawnTimer = 0;
      spawnOffscreen(Leviathan);
      if (!leviathanEntranceTriggered) {
        leviathanEntranceTriggered = true;
        camera.shake(10, 0.5);
      }
    }
  }
}

function initTimeline() {
  devourerSpawnTimer  = 0;
  jellyfishSpawnTimer = 0;
  leviathanSpawnTimer = 0;
  shuttleLargeRespawnTimer = 0;
  leviathanEntranceTriggered = false;
  const count = SHUTTLE_LARGE_MAX;
  const spawnDist = Math.max(canvas.width, canvas.height) * 0.8;
  for (let i = 0; i < count; i++) {
    const a  = (i / count) * Math.PI * 2;
    const ex = canvas.width  / 2 + Math.cos(a) * spawnDist;
    const ey = canvas.height / 2 + Math.sin(a) * spawnDist;
    enemies.push(new ShuttleLarge(ex, ey));
  }
}

function isIntroPauseChar(ch) {
  return /[，。！？、；：,.!?;:—…]/.test(ch);
}

function updateIntro(dt) {
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;

  if (intro.phase === 'fadeIn') {
    intro.timer += dt;
    intro.playerAlpha = Math.min(1, intro.timer / 2);
    if (intro.timer >= 2) {
      intro.phase = 'typing';
      intro.timer = 0;
      intro.lineIndex = 0;
      intro.charIndex = 0;
      intro.charTimer = 0;
      intro.nextCharDelay = 0.06;
      intro.completedLines = [];
      intro.mechAlpha = 0;
      intro.clickReady = false;
    }
    return;
  }

  if (intro.phase === 'typing') {
    if (intro.lineIndex < introLines.length) {
      const line = introLines[intro.lineIndex];
      if (intro.charIndex < line.text.length) {
        intro.charTimer += dt;
        if (intro.charTimer >= intro.nextCharDelay) {
          const ch = line.text.charAt(intro.charIndex);
          intro.charIndex++;
          intro.charTimer = 0;
          intro.nextCharDelay = isIntroPauseChar(ch) ? 0.21 : 0.06;
        }
      } else {
        intro.completedLines.push(line.text);
        intro.lineIndex++;
        intro.charIndex = 0;
        intro.charTimer = 0;
        intro.nextCharDelay = 0.06;
        if (intro.lineIndex >= introLines.length) {
          intro.timer = 0;
        }
      }
      return;
    }

    intro.timer += dt;
    if (intro.timer >= 2) {
      intro.phase = 'waitClick';
      intro.timer = 0;
      intro.clickReady = true;
    }
    return;
  }

  if (intro.phase === 'waitClick') {
    intro.timer += dt;
    intro.promptAlpha = 0.5 + 0.3 * Math.sin(intro.timer * 2.5);
  }
}

function drawIntro() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  if (intro.phase === 'typing' || intro.phase === 'waitClick') {
    const lineHeight = 36;
    const lastLineTargetY = canvas.height * 0.72;
    const storyStartY = lastLineTargetY - (introLines.length - 1) * lineHeight;
    const storyAlpha = intro.phase === 'waitClick' ? Math.max(0.3, 1 - intro.timer * 0.5) : 1;

    // Card background for story text
    const totalLines = intro.completedLines.length + (intro.phase === 'typing' && intro.lineIndex < introLines.length ? 1 : 0);
    if (totalLines > 0 && storyAlpha > 0) {
      const cardPadX = 40, cardPadTop = 24, cardPadBot = 20;
      const cardTop = storyStartY - cardPadTop;
      const cardBot = storyStartY + (totalLines - 1) * lineHeight + cardPadBot;
      const cardW = Math.min(canvas.width * 0.7, 600);
      ctx.save();
      ctx.globalAlpha = storyAlpha * 0.35;
      ctx.fillStyle = '#0A1520';
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      const rx = cx - cardW / 2, ry = cardTop, rw = cardW, rh = cardBot - cardTop;
      const cr = 12;
      ctx.beginPath();
      ctx.moveTo(rx + cr, ry);
      ctx.lineTo(rx + rw - cr, ry);
      ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + cr);
      ctx.lineTo(rx + rw, ry + rh - cr);
      ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - cr, ry + rh);
      ctx.lineTo(rx + cr, ry + rh);
      ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - cr);
      ctx.lineTo(rx, ry + cr);
      ctx.quadraticCurveTo(rx, ry, rx + cr, ry);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    for (let i = 0; i < intro.completedLines.length; i++) {
      drawGlowText(intro.completedLines[i], cx, storyStartY + i * lineHeight, {
        size: 20, color: UI_COLORS.white, weight: 500, letterSpacing: 3,
        align: 'center', glowBlur: 8, alpha: 0.7 * storyAlpha,
      });
    }

    if (intro.phase === 'typing' && intro.lineIndex < introLines.length) {
      const currentText = introLines[intro.lineIndex].text.substring(0, intro.charIndex);
      drawGlowText(currentText, cx, storyStartY + intro.completedLines.length * lineHeight, {
        size: 20, color: UI_COLORS.white, weight: 500, letterSpacing: 3,
        align: 'center', glowBlur: 12, alpha: storyAlpha,
      });
    }
  }

  if (intro.phase === 'waitClick') {
    const lastLineTargetY2 = canvas.height * 0.72;
    const storyStartY2 = lastLineTargetY2 - (introLines.length - 1) * 36;
    const pPulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);
    drawGlowText('点击开始', cx, storyStartY2 - 40, {
      size: 18, color: '#FFFFFF', weight: 700, letterSpacing: 6,
      align: 'center', glowBlur: 0, alpha: intro.promptAlpha * (0.5 + pPulse * 0.5),
    });
  }
}

function drawPlayerStatic() {
  const drawRadius = player.radius + (player.absorbPulse > 0 ? 4 * (player.absorbPulse / 0.15) : 0);
  const glowSize = player.frenzyTimer > 0 ? 50 : 25;
  const playerColor = player.frenzyTimer > 0 ? '#FFD700' : '#FF9500';
  // Fade-in during game start buffer
  if (gameStartTimer > 0) {
    const fadeAlpha = Math.min(1, (3 - gameStartTimer) / 1.5);
    ctx.save();
    ctx.globalAlpha = fadeAlpha;
    drawGlowCircle(player.x, player.y, drawRadius, playerColor, glowSize);
    ctx.restore();
  } else {
    drawGlowCircle(player.x, player.y, drawRadius, playerColor, glowSize);
  }
}

function drawRuntimeFrameStatic() {
  ctx.save();
  ctx.translate(camera.shakeX, camera.shakeY);
  drawPlayerStatic();
  for (let i = 0; i < nutrients.length; i++) nutrients[i].draw();
  for (let i = 0; i < enemies.length; i++) if (enemies[i].active) enemies[i].draw();
  for (let i = 0; i < spores.length; i++) if (spores[i].active) spores[i].draw();
  for (let i = 0; i < aoeFlashes.length; i++) {
    const f = aoeFlashes[i];
    if (f.t <= 0) continue;
    ctx.save();
    ctx.globalAlpha = (f.t / 0.3) * 0.4;
    ctx.strokeStyle = '#FF8800';
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#FF8800';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  for (let i = 0; i < flashEffects.length; i++) {
    const f = flashEffects[i];
    if (f.life <= 0) continue;
    const alpha = f.life / f.maxLife;
    const radius = f.r * (1 + (1 - alpha) * 1.5);
    ctx.save();
    ctx.globalAlpha = alpha * 0.85;
    ctx.shadowBlur = radius * 2;
    ctx.shadowColor = f.color;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.arc(f.x, f.y, radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  for (let i = 0; i < deathParticles.length; i++) if (deathParticles[i].life > 0) deathParticles[i].draw();
  for (let i = 0; i < shockwaves.length; i++) {
    const sw = shockwaves[i];
    if (sw.t <= 0) continue;
    const progress = 1 - sw.t / sw.maxT;
    const r = sw.maxR * progress;
    const alpha = (1 - progress) * 0.5;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = sw.color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = sw.color;
    ctx.lineWidth = Math.max(0.5, 4 * (1 - progress * 0.7));
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
